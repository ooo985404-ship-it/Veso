<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vezo AI Pro</title>
    
    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
        
        // إعدادات لتجاوز قيود الاستضافة
        env.allowLocalModels = false;
        env.useBrowserCache = true;

        let segmenter;
        const status = document.getElementById("status");

        async function init() {
            try {
                status.innerText = "⏳ جاري تشغيل المحرك الذكي...";
                // استخدام النسخة الخفيفة جداً لضمان العمل على الاستضافات المجانية
                segmenter = await pipeline('image-segmentation', 'Xenova/remove-background'); 
                status.innerText = "✅ النظام جاهز";
            } catch (err) {
                status.innerText = "❌ خطأ في الاتصال: تأكد من تشغيل HTTPS";
                console.error(err);
            }
        }

        window.processImage = async function() {
            const file = document.getElementById("upload").files[0];
            if (!file || !segmenter) return alert("الرجاء اختيار صورة والانتظار حتى يجهز النظام");

            status.innerText = "⏳ جاري المعالجة (قد تستغرق لحظات)...";
            
            try {
                const url = URL.createObjectURL(file);
                const result = await segmenter(url);
                
                const canvas = document.getElementById("canvas");
                canvas.width = result.width;
                canvas.height = result.height;
                const ctx = canvas.getContext("2d");
                
                ctx.putImageData(result.mask, 0, 0);
                status.innerText = "✨ تمت الإزالة بنجاح!";
            } catch (e) {
                status.innerText = "❌ حدث خطأ أثناء المعالجة";
            }
        }

        window.downloadImage = function() {
            const canvas = document.getElementById("canvas");
            if(canvas.width === 0) return alert("لا توجد صورة لتحميلها");
            const link = document.createElement("a");
            link.download = "vezo_no_bg.png";
            link.href = canvas.toDataURL("image/png");
            link.click();
        }

        init();
    </script>

    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .upload-box { border: 2px dashed #ddd; padding: 20px; border-radius: 15px; margin: 15px 0; }
        button { background: #c5a059; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        #status { background: #f9f9f9; padding: 10px; border-radius: 8px; font-size: 13px; color: #555; }
        canvas { width: 100%; border-radius: 10px; margin-top: 15px; background: #eee url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAMUlEQVQ4T2NkYGAQYcAP3uPBAp8hyM9Y6A88NAtBAmCC6D8QfIBe8f8fGnu6AUMAtDcAn7QLS9L6O7AAAAAASUVORK5CYII='); }
    </style>
</head>
<body>

<div class="card">
    <h3>Vezo AI Pro 🔥</h3>
    <div class="upload-box">
        <input type="file" id="upload" accept="image/*">
    </div>
    <button onclick="processImage()">🚀 إزالة الخلفية</button>
    <div id="status">⏳ تهيئة النظام...</div>
    <canvas id="canvas"></canvas>
    <button onclick="downloadImage()" style="background: #333; margin-top:15px;">📥 تحميل PNG</button>
</div>

</body>
</html>
