<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Vezo Studio Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding: 20px; }
        .container { background: white; max-width: 500px; margin: auto; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .item { border: 2px solid #ddd; border-radius: 10px; cursor: pointer; padding: 5px; }
        .item.active { border-color: #c5a059; background: #fff9eb; }
        .item img { width: 100%; height: 80px; object-fit: cover; border-radius: 5px; }
        .upload-box { border: 2px dashed #bbb; padding: 30px; margin: 20px 0; cursor: pointer; border-radius: 10px; }
        .btn { background: #c5a059; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-zip { background: #333; margin-top: 10px; display: none; }
        #status { margin-top: 15px; color: #666; font-size: 14px; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>استوديو فيزو الذكي</h2>
    
    <div class="grid">
        <div class="item active" onclick="sel(this, 'sadu.png')">
            <img src="sadu.png" onerror="this.src='https://placehold.co/200x100?text=Background+1'">
            <div>خلفية 1</div>
        </div>
        <div class="item" onclick="sel(this, 'lgrey.png')">
            <img src="lgrey.png" onerror="this.src='https://placehold.co/200x100?text=Background+2'">
            <div>خلفية 2</div>
        </div>
    </div>

    <div class="upload-box" onclick="document.getElementById('inp').click()">
        <input type="file" id="inp" accept="image/*" multiple style="display:none">
        <div>📁 اضغط هنا لرفع الصور</div>
    </div>

    <button id="go" class="btn" onclick="start()">🚀 ابدأ المعالجة الآن</button>
    <button id="dl" class="btn btn-zip" onclick="finalZip()">📥 تحميل جميع الصور (ZIP)</button>
    
    <div id="status">جاهز للعمل</div>
</div>

<canvas id="cvs"></canvas>

<script>
    let filesDone = [];
    let bgUrl = 'sadu.png';

    // مفاتيحك الخاصة (لا تغيرها)
    const KEY_BG = '3pocTt3qctAkVgwcwJ4RBE2n'; 
    const CLOUD_NAME = 'dt6t6rdop';
    const CLOUD_PRESET = 'cd3h66ff'; 

    function sel(el, url) {
        bgUrl = url;
        document.querySelectorAll('.item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }

    async function start() {
        const files = document.getElementById('inp').files;
        if (files.length === 0) return alert("من فضلك اختر صور");

        document.getElementById('go').disabled = true;
        document.getElementById('status').innerText = "جاري المعالجة... انتظر";
        filesDone = [];

        try {
            const bgImg = await load(bgUrl);

            for (let i = 0; i < files.length; i++) {
                // 1. مسح الخلفية
                const fd1 = new FormData();
                fd1.append('image_file', files[i]);
                const res1 = await fetch('https://api.remove.bg/v1.0/removebg', {
                    method: 'POST', headers: { 'X-Api-Key': KEY_BG }, body: fd1
                });
                const blob1 = await res1.blob();

                // 2. الرفع والتحسين لـ Cloudinary
                const fd2 = new FormData();
                fd2.append('file', blob1);
                fd2.append('upload_preset', CLOUD_PRESET);
                const res2 = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                    method: 'POST', body: fd2
                });
                const data2 = await res2.json();
                
                // رابط التحسين (e_upscale)
                const hdUrl = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/e_upscale,e_sharpen:100,f_auto,q_auto:best/${data2.public_id}.png`;
                const prodImg = await load(hdUrl);

                // 3. الدمج في الكانفاس
                const canvas = document.getElementById('cvs');
                const ctx = canvas.getContext('2d');
                canvas.width = 2000; canvas.height = 2000;
                ctx.drawImage(bgImg, 0, 0, 2000, 2000);
                
                const s = Math.min(2000/prodImg.width, 2000/prodImg.height) * 0.8;
                const w = prodImg.width * s, h = prodImg.height * s;
                ctx.drawImage(prodImg, (2000-w)/2, (2000-h)/2, w, h);

                const finalBlob = await new Promise(r => canvas.toBlob(r, 'image/png'));
                filesDone.push({ n: `image_${i+1}.png`, b: finalBlob });
                document.getElementById('status').innerText = `تمت معالجة ${i+1} من ${files.length}`;
            }

            document.getElementById('status').innerText = "✅ اكتملت المعالجة!";
            document.getElementById('dl').style.display = 'block';
        } catch (e) {
            alert("حدث خطأ! تأكد من مفتاح الـ API");
            document.getElementById('status').innerText = "خطأ في المعالجة";
        }
        document.getElementById('go').disabled = false;
    }

    function load(src) {
        return new Promise((res, rej) => {
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.onload = () => res(img);
            img.onerror = () => rej();
            img.src = src;
        });
    }

    async function finalZip() {
        const zip = new JSZip();
        filesDone.forEach(f => zip.file(f.n, f.b));
        const content = await zip.generateAsync({type:"blob"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(content);
        a.download = "Vezo_Photos.zip";
        a.click();
    }
</script>

</body>
</html>
