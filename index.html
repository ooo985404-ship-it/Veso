<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vezo Ultra AI Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --primary: #c5a059; --dark: #1f2937; }
        body { font-family: sans-serif; background: #f3f4f6; padding: 20px; display: flex; justify-content: center; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        .templates-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 20px 0; }
        .template-item { border: 2px solid #eee; border-radius: 12px; cursor: pointer; padding: 5px; transition: 0.3s; }
        .template-item img { width: 100%; height: 80px; object-fit: cover; border-radius: 8px; display: block; }
        .template-item.active { border-color: var(--primary); background: #fffbeb; }
        .upload-area { border: 2px dashed #ccc; padding: 30px; border-radius: 15px; margin: 20px 0; cursor: pointer; }
        .progress-box { display: none; margin: 20px 0; }
        .bar-bg { width: 100%; height: 10px; background: #eee; border-radius: 5px; overflow: hidden; }
        .bar-fill { width: 0%; height: 100%; background: var(--primary); transition: 0.3s; }
        .main-btn { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .zip-btn { background: var(--dark); margin-top: 10px; display: none !important; } /* سيتم إظهاره عبر JS */
        canvas { display: none; }
        #status { font-size: 13px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0;">Vezo Studio HD</h2>
    
    <div class="templates-grid">
        <div class="template-item active" onclick="selectTpl('sadu.png', this)">
            <img src="sadu.png" onerror="this.src='https://via.placeholder.com/150?text=Sadu+BG'">
            <span>سدو</span>
        </div>
        <div class="template-item" onclick="selectTpl('lgrey.png', this)">
            <img src="lgrey.png" onerror="this.src='https://via.placeholder.com/150?text=Grey+Studio'">
            <span>استوديو</span>
        </div>
    </div>

    <div class="upload-area" onclick="document.getElementById('imageInput').click()">
        <input type="file" id="imageInput" accept="image/*" multiple style="display:none">
        <div>📸 ارفع الصور (التحسين مفعل)</div>
    </div>

    <div class="progress-box" id="pBox">
        <div id="pText" style="font-size:12px; margin-bottom:5px;">جاري المعالجة...</div>
        <div class="bar-bg"><div class="bar-fill" id="pFill"></div></div>
    </div>

    <button id="processBtn" class="main-btn" onclick="startProduction()">🚀 بدء المعالجة</button>
    <button id="zipBtn" class="main-btn zip-btn" onclick="downloadZip()">📥 تحميل ملف ZIP</button>
    
    <div id="status">جاهز</div>
</div>

<canvas id="mainCanvas"></canvas>

<script>
    let processedFiles = [];
    let selectedTplUrl = 'sadu.png';

    const REMOVE_BG_KEY = '3pocTt3qctAkVgwcwJ4RBE2n'; 
    const CLOUDINARY_NAME = 'dt6t6rdop';
    const CLOUDINARY_PRESET = 'cd3h66ff'; 

    function selectTpl(url, el) {
        selectedTplUrl = url;
        document.querySelectorAll('.template-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }

    async function startProduction() {
        const files = document.getElementById('imageInput').files;
        if (files.length === 0) return alert("اختر صوراً");

        document.getElementById('processBtn').disabled = true;
        document.getElementById('pBox').style.display = 'block';
        document.getElementById('zipBtn').style.setProperty('display', 'none', 'important');
        processedFiles = [];

        try {
            const bgImg = await loadImg(selectedTplUrl);

            for (let i = 0; i < files.length; i++) {
                updateProgress(i, files.length);

                // 1. القص
                const noBgBlob = await callRemoveBg(files[i]);

                // 2. التحسين (Cloudinary)
                const hdUrl = await upgradeImage(noBgBlob);
                const productImg = await loadImg(hdUrl);

                // 3. الدمج
                const finalBlob = await mergeImages(bgImg, productImg);
                processedFiles.push({ name: `Vezo_HD_${i+1}.png`, blob: finalBlob });
            }

            document.getElementById('status').innerText = "اكتملت المعالجة!";
            document.getElementById('zipBtn').style.setProperty('display', 'block', 'important');
        } catch (e) {
            alert("خطأ: تأكد من مفاتيح الـ API");
            console.error(e);
        }
        document.getElementById('processBtn').disabled = false;
    }

    async function callRemoveBg(file) {
        const formData = new FormData();
        formData.append('image_file', file);
        const res = await fetch('https://api.remove.bg/v1.0/removebg', {
            method: 'POST', headers: { 'X-Api-Key': REMOVE_BG_KEY }, body: formData
        });
        return await res.blob();
    }

    async function upgradeImage(blob) {
        const formData = new FormData();
        formData.append('file', blob);
        formData.append('upload_preset', CLOUDINARY_PRESET);
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_NAME}/image/upload`, {
            method: 'POST', body: formData
        });
        const data = await res.json();
        return `https://res.cloudinary.com/${CLOUDINARY_NAME}/image/upload/e_upscale,e_sharpen:100,q_auto:best/${data.public_id}.png`;
    }

    async function mergeImages(bg, prod) {
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 2048; canvas.height = 2048;
        
        ctx.drawImage(bg, 0, 0, 2048, 2048);
        
        const scale = Math.min(2048 / prod.width, 2048 / prod.height) * 0.8;
        const w = prod.width * scale;
        const h = prod.height * scale;
        const x = (2048 - w) / 2;
        const y = (2048 - h) / 2;

        ctx.shadowColor = "rgba(0,0,0,0.3)"; ctx.shadowBlur = 40; ctx.shadowOffsetY = 20;
        ctx.drawImage(prod, x, y, w, h);

        return new Promise(r => canvas.toBlob(r, 'image/png'));
    }

    function loadImg(url) {
        return new Promise((resolve, reject) => {
            const i = new Image();
