<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Vezo Studio AI - إصلاح شامل</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; text-align: center; padding: 20px; }
        .card { background: white; max-width: 420px; margin: auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .upload-zone { border: 2px dashed #c5a059; padding: 30px; border-radius: 15px; margin: 20px 0; cursor: pointer; background: #fffcf9; }
        .btn { background: #c5a059; color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn:disabled { background: #ccc; }
        #dlBtn { background: #1a1a1a; margin-top: 10px; display: none !important; }
        #status { margin-top: 15px; font-size: 13px; color: #666; font-weight: bold; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Vezo Studio AI</h2>
    <p style="font-size:12px; color:#888;">نظام المعالجة السحابي المحدث</p>
    
    <div class="upload-zone" onclick="document.getElementById('f').click()">
        <input type="file" id="f" accept="image/*" multiple style="display:none">
        <div style="font-size:30px;">🖼️</div>
        <strong>اضغط لرفع الصور</strong>
    </div>

    <button id="go" class="btn" onclick="process()">🚀 معالجة الصور الآن</button>
    <button id="dlBtn" class="btn" onclick="zipNow()">📥 تحميل النتائج (ZIP)</button>
    
    <div id="status">جاهز للعمل بالمفتاح الجديد</div>
</div>

<canvas id="c"></canvas>

<script>
    let results = [];

    // الإعدادات مأخوذة مباشرة من صورك
    const CONFIG = {
        REMOVE_BG: 'Kxns19EXihefmvtjJBnANqHb', // المفتاح الجديد
        CLOUD_NAME: 'dt6t6rdop',               // من صورتك رقم 3
        PRESET: 'vezo_preset'                  // من صورتك رقم 12 (Unsigned)
    };

    async function process() {
        const files = document.getElementById('f').files;
        if (files.length === 0) return alert("لطفاً اختر الصور أولاً");

        const btn = document.getElementById('go');
        const st = document.getElementById('status');
        btn.disabled = true;
        results = [];

        try {
            for (let i = 0; i < files.length; i++) {
                st.innerText = `جاري مسح خلفية صورة ${i+1}...`;

                // 1. مسح الخلفية (Remove.bg)
                const fd1 = new FormData();
                fd1.append('image_file', files[i]);
                const res1 = await fetch('https://api.remove.bg/v1.0/removebg', {
                    method: 'POST', headers: { 'X-Api-Key': CONFIG.REMOVE_BG }, body: fd1
                });
                
                if (!res1.ok) throw new Error("تأكد من رصيد مفتاح Remove.bg الجديد");
                const blob1 = await res1.blob();

                st.innerText = `رفع وتحسين الجودة (Cloudinary)...`;

                // 2. الرفع لـ Cloudinary (بدون API Key لتجنب خطأ التضارب)
                const fd2 = new FormData();
                fd2.append('file', blob1);
                fd2.append('upload_preset', CONFIG.PRESET);
                
                // الرابط المباشر للرفع غير الموقع
                const res2 = await fetch(`https://api.cloudinary.com/v1_1/${CONFIG.CLOUD_NAME}/image/upload`, {
                    method: 'POST', body: fd2
                });
                
                const data2 = await res2.json();
                if (!res2.ok) throw new Error(`مشكلة في Cloudinary: ${data2.error.message}`);
                
                // رابط التحسين HD النهائي
                const finalUrl = `https://res.cloudinary.com/${CONFIG.CLOUD_NAME}/image/upload/e_upscale,q_auto:best/${data2.public_id}.png`;
                await createFinal(finalUrl, i);
                st.innerText = `اكتملت صورة ${i+1}`;
            }

            st.innerHTML = "<b style='color:green'>✅ تم بنجاح!</b>";
            document.getElementById('dlBtn').style.setProperty('display', 'block', 'important');
        } catch (e) {
            alert(e.message);
            st.innerText = "فشلت العملية.";
        }
        btn.disabled = false;
    }

    async function createFinal(url, idx) {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = url;
        await new Promise(r => img.onload = r);
        
        const cvs = document.getElementById('c');
        const ctx = cvs.getContext('2d');
        cvs.width = 1500; cvs.height = 1500;
        ctx.fillStyle = "white"; ctx.fillRect(0, 0, 1500, 1500);
        
        const s = Math.min(1100/img.width, 1100/img.height);
        const w = img.width * s, h = img.height * s;
        ctx.drawImage(img, (1500-w)/2, (1500-h)/2, w, h);
        
        const blob = await new Promise(r => cvs.toBlob(r, 'image/png'));
        results.push({ name: `Vezo_Pro_${idx+1}.png`, blob: blob });
    }

    async function zipNow() {
        const zip = new JSZip();
        results.forEach(r => zip.file(r.name, r.blob));
        const b = await zip.generateAsync({type:"blob"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(b);
        a.download = "Vezo_Studio_Package.zip";
        a.click();
    }
</script>

</body>
</html>
