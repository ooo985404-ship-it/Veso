<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vezo AI Studio - Ultra HD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --primary: #c5a059; --dark: #1f2937; }
        body { font-family: sans-serif; background: #f3f4f6; padding: 20px; display: flex; justify-content: center; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 550px; text-align: center; }
        
        .upload-area { border: 2px dashed #ccc; padding: 25px; border-radius: 20px; margin-bottom: 20px; cursor: pointer; background: #fff; }
        
        .templates-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(85px, 1fr)); gap: 12px; margin: 20px 0; }
        .template-item { border: 3px solid #eee; border-radius: 15px; overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; }
        .template-item img { width: 100%; height: 75px; object-fit: cover; display: block; }
        .template-item span { font-size: 11px; padding: 6px; display: block; font-weight: bold; color: #555; background: #fafafa; }
        .template-item.active { border-color: var(--primary); transform: scale(1.08); box-shadow: 0 8px 20px rgba(197, 160, 89, 0.4); }

        .progress-box { display: none; margin: 20px 0; }
        .bar-bg { width: 100%; height: 12px; background: #eee; border-radius: 6px; overflow: hidden; }
        .bar-fill { width: 0%; height: 100%; background: var(--primary); transition: 0.4s; }
        
        .main-btn { background: var(--primary); color: white; border: none; padding: 16px; width: 100%; border-radius: 14px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .zip-btn { background: var(--dark); margin-top: 12px; display: none; }

        canvas { display: none; }
        #status { font-size: 13px; color: #64748b; margin-top: 12px; }
        
        /* شارة الدقة العالية */
        .hd-badge { background: #10b981; color: white; font-size: 10px; padding: 2px 8px; border-radius: 10px; position: absolute; top: 10px; right: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="hd-badge">Ultra HD Active</div>
    <h2 style="margin-bottom:8px;">🚀 Vezo HD Studio</h2>
    <p style="font-size:13px; color:#666; margin-bottom:25px;">تحسين تلقائي للوضوح والدقة</p>

    <h4 style="text-align:right; margin-bottom:12px;">1. اختر الخلفية المعتمدة:</h4>
    <div class="templates-grid" id="tplGrid">
        <div class="template-item active" onclick="selectTpl('sadu.png', this)"><img src="sadu.png"><span>سدو</span></div>
        <div class="template-item" onclick="selectTpl('ksanat.png', this)"><img src="ksanat.png"><span>وطني</span></div>
        <div class="template-item" onclick="selectTpl('founding.png', this)"><img src="founding.png"><span>التأسيس</span></div>
        <div class="template-item" onclick="selectTpl('lgrey.png', this)"><img src="lgrey.png"><span>رمادي</span></div>
        <div class="template-item" onclick="selectTpl('grad.png', this)"><img src="grad.png"><span>متدرج</span></div>
    </div>

    <div class="upload-area" onclick="document.getElementById('imageInput').click()">
        <input type="file" id="imageInput" accept="image/*" multiple style="display:none">
        <div id="uploadText">📁 ارفع صورك (جودة فائقة)</div>
    </div>

    <div class="progress-box" id="pBox">
        <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:6px;">
            <span id="pText">جاري المعالجة...</span>
            <span id="pPerc">0%</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" id="pFill"></div></div>
    </div>

    <button id="processBtn" class="main-btn" onclick="startProduction()">🚀 بدء الإنتاج الاحترافي</button>
    <button id="zipBtn" class="main-btn zip-btn" onclick="downloadZip()">📥 تحميل ملف ZIP</button>
    
    <div id="status">جاهز للاستخدام بدقة 2000px</div>
</div>

<canvas id="mainCanvas"></canvas>

<script>
    let processedFiles = [];
    let selectedTpl = 'sadu.png';
    const API_KEY = '3pocTt3qctAkVgwcwJ4RBE2n'; 

    function selectTpl(url, el) {
        selectedTpl = url;
        document.querySelectorAll('.template-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }

    async function startProduction() {
        const files = document.getElementById('imageInput').files;
        if (files.length === 0) return alert("اختر صوراً أولاً");

        document.getElementById('processBtn').disabled = true;
        document.getElementById('pBox').style.display = 'block';
        processedFiles = [];

        try {
            const bgImg = await loadImg(selectedTpl);

            for (let i = 0; i < files.length; i++) {
                document.getElementById('status').innerText = `جاري تحسين ودمج صورة ${i+1}...`;
                
                try {
                    const noBgBlob = await callRemoveBg(files[i]);
                    const productImg = await loadImg(URL.createObjectURL(noBgBlob));
                    
                    // استخدام دالة الدمج المطورة (الوضوح العالي)
                    const finalBlob = await mergeImagesHD(bgImg, productImg);
                    
                    processedFiles.push({ name: `Vezo_HD_${i+1}.png`, blob: finalBlob });
                } catch (e) { console.error(e); }

                let progress = ((i + 1) / files.length) * 100;
                document.getElementById('pFill').style.width = progress + '%';
                document.getElementById('pPerc').innerText = Math.round(progress) + '%';
                await new Promise(r => setTimeout(r, 600));
            }

            document.getElementById('status').innerText = "✨ اكتملت المعالجة بدقة عالية!";
            document.getElementById('zipBtn').style.display = 'block';
        } catch (e) { alert("حدث خطأ في النظام"); }
        document.getElementById('processBtn').disabled = false;
    }

    async function callRemoveBg(file) {
        const formData = new FormData();
        formData.append('image_file', file);
        const response = await fetch('https://api.remove.bg/v1.0/removebg', {
            method: 'POST', headers: { 'X-Api-Key': API_KEY }, body: formData
        });
        return await response.blob();
    }

    function loadImg(url) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.src = url;
        });
    }

    // دالة المعالجة فائقة الوضوح
    async function mergeImagesHD(bg, prod) {
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        
        // ضبط مساحة العمل على دقة عالية (2000 بكسل)
        canvas.width = 2000;
        canvas.height = 2000;

        // تفعيل خوارزميات التنعيم عالية الجودة
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';

        // رسم الخلفية لتغطي كامل المساحة الجديدة
        ctx.drawImage(bg, 0, 0, 2000, 2000);

        // إضافة الظل الاحترافي (Shadow Depth)
        ctx.shadowColor = "rgba(0,0,0,0.35)";
        ctx.shadowBlur = 45;
        ctx.shadowOffsetY = 30;

        // حساب المقاسات لتوسيط المنتج بنسبة 80% من المساحة
        const scale = Math.min(canvas.width / prod.width, canvas.height / prod.height) * 0.8;
        const w = prod.width * scale;
        const h = prod.height * scale;
        const x = (canvas.width - w) / 2;
        const y = (canvas.height - h) / 2;
        
        ctx.drawImage(prod, x, y, w, h);

        // حفظ الصورة النهائية بأعلى جودة PNG (1.0)
        return new Promise(r => canvas.toBlob(r, 'image/png', 1.0));
    }

    async function downloadZip() {
        const zip = new JSZip();
        processedFiles.forEach(f => zip.file(f.name, f.blob));
        const content = await zip.generateAsync({type:"blob"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(content);
        a.download = `Vezo_UltraHD_Collection.zip`;
        a.click();
    }

    document.getElementById('imageInput').onchange = function() {
        document.getElementById('uploadText').innerText = `📦 تم اختيار ${this.files.length} صور`;
    };
</script>

</body>
</html>
