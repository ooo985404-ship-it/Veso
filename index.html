<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vezo AI Pro - دمج الخلفيات</title>
    <style>
        :root { --primary: #c5a059; --saudi: #006C35; }
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 450px; text-align: center; }
        
        .preview-container { 
            position: relative; width: 100%; min-height: 250px; background: #eee; 
            border-radius: 15px; margin-top: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center;
            background-image: linear-gradient(45deg, #ddd 25%, transparent 25%), linear-gradient(-45deg, #ddd 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ddd 75%), linear-gradient(-45deg, transparent 75%, #ddd 75%);
            background-size: 20px 20px;
        }
        #resultImg { max-width: 100%; max-height: 400px; display: none; z-index: 5; }
        
        .bg-options { display: none; justify-content: space-between; margin-top: 15px; gap: 8px; }
        .bg-btn { flex: 1; padding: 10px 5px; font-size: 12px; border: 2px solid transparent; border-radius: 10px; cursor: pointer; color: white; font-weight: bold; transition: 0.3s; }
        .bg-btn.active { border-color: var(--primary); transform: scale(1.05); }
        
        .btn-saudi { background: var(--saudi); }
        .btn-trans { background: #888; border: 1px solid #ccc; }
        .btn-white { background: #fff; color: #333; border: 1px solid #ddd; }
        .btn-black { background: #000; color: #fff; }

        input[type="file"] { margin-bottom: 15px; width: 100%; }
        .main-btn { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #status { margin: 10px 0; font-size: 13px; color: #666; }
        canvas { display: none; } /* كانفاس مخفي للمعالجة فقط */
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-bottom:5px">🚀 Vezo AI Models</h2>
    <p style="font-size:12px; color:#888; margin-bottom:20px">إزالة الخلفية والدمج الفوري</p>
    
    <input type="file" id="imageInput" accept="image/*">
    <button id="processBtn" class="main-btn" onclick="processImage()">إزالة الخلفية</button>
    
    <div id="status">جاهز للاستخدام</div>

    <div class="preview-container" id="previewBox">
        <img id="resultImg" crossorigin="anonymous">
    </div>

    <div class="bg-options" id="bgOptions">
        <button class="bg-btn btn-saudi" onclick="applyBg('#006C35', this)">Saudi</button>
        <button class="bg-btn btn-trans" onclick="applyBg('transparent', this)">شفاف</button>
        <button class="bg-btn btn-white" onclick="applyBg('#ffffff', this)">أبيض</button>
        <button class="bg-btn btn-black" onclick="applyBg('#000000', this)">سدو</button>
    </div>

    <button id="dlBtn" style="display:none; background:#1f2937" class="main-btn" onclick="downloadCombined()">📥 تحميل الصورة المدمجة</button>
    <canvas id="exportCanvas"></canvas>
</div>

<script>
    let currentColor = 'transparent';

    async function processImage() {
        const fileInput = document.getElementById('imageInput');
        const status = document.getElementById('status');
        const resultImg = document.getElementById('resultImg');
        const bgOptions = document.getElementById('bgOptions');

        if (!fileInput.files[0]) return alert("الرجاء اختيار صورة");

        status.innerText = "⏳ جاري المعالجة الرقمية...";
        
        const formData = new FormData();
        formData.append('image_file', fileInput.files[0]);

        try {
            const response = await fetch('https://api.remove.bg/v1.0/removebg', {
                method: 'POST',
                headers: { 'X-Api-Key': '3pocTt3qctAkVgwcwJ4RBE2n' },
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                resultImg.src = URL.createObjectURL(blob);
                resultImg.onload = () => {
                    resultImg.style.display = 'block';
                    bgOptions.style.display = 'flex';
                    document.getElementById('dlBtn').style.display = 'block';
                    status.innerText = "✨ اكتملت الإزالة! اختر لون الخلفية";
                };
            } else {
                status.innerText = "❌ حدث خطأ، تأكد من رصيد الـ API";
            }
        } catch (e) {
            status.innerText = "❌ خطأ في الاتصال بالسيرفر";
        }
    }

    function applyBg(color, btn) {
        currentColor = color;
        const box = document.getElementById('previewBox');
        
        // إزالة التحديد من الأزرار الأخرى
        document.querySelectorAll('.bg-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        if (color === 'transparent') {
            box.style.backgroundColor = "";
            box.style.backgroundImage = "linear-gradient(45deg, #ddd 25%, transparent 25%), linear-gradient(-45deg, #ddd 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ddd 75%), linear-gradient(-45deg, transparent 75%, #ddd 75%)";
        } else {
            box.style.backgroundImage = "none";
            box.style.backgroundColor = color;
        }
    }

    function downloadCombined() {
        const img = document.getElementById('resultImg');
        const canvas = document.getElementById('exportCanvas');
        const ctx = canvas.getContext('2d');

        // ضبط مقاسات الكانفاس لمطابقة الصورة الأصلية
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;

        // 1. رسم الخلفية
        if (currentColor !== 'transparent') {
            ctx.fillStyle = currentColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // 2. رسم الصورة فوق الخلفية
        ctx.drawImage(img, 0, 0);

        // 3. التصدير والتحميل
        const link = document.createElement('a');
        link.download = `vezo_${Date.now()}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
    }
</script>

</body>
</html>
