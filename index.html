<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vezo Ultra AI v2.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --primary: #c5a059; --dark: #1f2937; --success: #10b981; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; position: relative; border: 1px solid #e1e4e8; }
        .hd-badge { background: var(--success); color: white; font-size: 11px; padding: 5px 12px; border-radius: 50px; position: absolute; top: 20px; right: 20px; font-weight: bold; box-shadow: 0 4px 10px rgba(16,185,129,0.3); }
        .templates-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 25px 0; }
        .template-item { border: 2px solid #eee; border-radius: 15px; cursor: pointer; transition: all 0.3s ease; padding: 8px; background: #fafafa; }
        .template-item img { width: 100%; height: 70px; object-fit: cover; border-radius: 10px; margin-bottom: 5px; }
        .template-item span { font-size: 14px; font-weight: 600; color: #444; }
        .template-item.active { border-color: var(--primary); background: #fffbeb; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(197,160,89,0.2); }
        .upload-area { border: 2px dashed #c5a059; padding: 40px 20px; border-radius: 20px; margin: 20px 0; cursor: pointer; background: #fdfbf7; transition: 0.3s; }
        .upload-area:hover { background: #f9f5ed; border-color: #b38f4d; }
        .progress-box { display: none; margin: 25px 0; text-align: right; }
        .bar-bg { width: 100%; height: 12px; background: #eee; border-radius: 6px; overflow: hidden; margin-top: 8px; border: 1px solid #ddd; }
        .bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #c5a059, #e2c08d); transition: 0.4s; }
        .main-btn { background: var(--primary); color: white; border: none; padding: 18px; width: 100%; border-radius: 15px; font-size: 17px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 8px 20px rgba(197,160,89,0.3); }
        .main-btn:active { transform: scale(0.98); }
        .main-btn:disabled { background: #bdc3c7; cursor: not-allowed; box-shadow: none; }
        .zip-btn { background: var(--dark); margin-top: 12px; display: none; }
        canvas { display: none; }
        #status { font-size: 13px; color: #666; margin-top: 15px; font-weight: 500; }
    </style>
</head>
<body>

<div class="card">
    <div class="hd-badge">ULTRA HD 2.0</div>
    <h2 style="margin:0; color:var(--dark); font-size: 24px;">Vezo AI Engine</h2>
    <p style="font-size:14px; color:#7f8c8d; margin-top: 5px;">معالجة احترافية مع تحسين الحواف والتباين</p>

    <div class="templates-grid">
        <div class="template-item active" onclick="selectTpl('sadu.png', this)">
            <img src="sadu.png"><span>الخلفية التراثية</span>
        </div>
        <div class="template-item" onclick="selectTpl('lgrey.png', this)">
            <img src="lgrey.png"><span>استوديو رمادي</span>
        </div>
    </div>

    <div class="upload-area" onclick="document.getElementById('imageInput').click()">
        <input type="file" id="imageInput" accept="image/*" multiple style="display:none">
        <div id="uploadText" style="color: #c5a059;">✨ <b>اضغط هنا لرفع صور المنتجات</b></div>
        <p style="font-size:11px; color:#999; margin:5px 0 0 0;">يمكنك رفع عدة صور في وقت واحد</p>
    </div>

    <div class="progress-box" id="pBox">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span id="pText" style="font-size:13px; color:var(--dark); font-weight:bold;">جاري التحسين...</span>
            <span id="pPerc" style="font-size:12px; color:var(--primary);">0%</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" id="pFill"></div></div>
    </div>

    <button id="processBtn" class="main-btn" onclick="startProduction()">🚀 بدء الإنتاج الفائق</button>
    <button id="zipBtn" class="main-btn zip-btn" onclick="downloadZip()">📥 تحميل المجموعة (ZIP)</button>
    
    <div id="status">جاهز للمعالجة بتقنية Cloudinary AI</div>
</div>

<canvas id="mainCanvas"></canvas>

<script>
    let processedFiles = [];
    let selectedTpl = 'sadu.png';

    // الإعدادات الخاصة بك
    const REMOVE_BG_KEY = '3pocTt3qctAkVgwcwJ4RBE2n'; 
    const CLOUDINARY_NAME = 'dt6t6rdop';
    const CLOUDINARY_PRESET = 'cd3h66ff'; 

    function selectTpl(url, el) {
        selectedTpl = url;
        document.querySelectorAll('.template-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }

    async function startProduction() {
        const files = document.getElementById('imageInput').files;
        if (files.length === 0) return alert("لطفاً، اختر الصور أولاً");

        const btn = document.getElementById('processBtn');
        const pBox = document.getElementById('pBox');
        btn.disabled = true;
        pBox.style.display = 'block';
        processedFiles = [];

        try {
            const bgImg = await loadImg(selectedTpl);

            for (let i = 0; i < files.length; i++) {
                updateUI(i, files.length, `تحسين: ${files[i].name}`);

                // 1. قص الخلفية (Remove.bg)
                const noBgBlob = await callRemoveBg(files[i]);

                // 2. الرفع والتحسين الفائق (Cloudinary AI v2.0)
                const hdUrl = await upgradeWithAI(noBgBlob);
                const productImg = await loadImg(hdUrl);

                // 3. الدمج مع فلاتر الحدة والتباين
                const finalBlob = await mergeWithFilters(bgImg, productImg);
                
                processedFiles.push({ name: `Vezo_Ultra_${i+1}.png`, blob: finalBlob });
            }

            document.getElementById('status').innerHTML = "<b style='color:var(--success)'>✨ اكتمل العمل! الصور الآن بدقة Ultra HD.</b>";
            document.getElementById('zipBtn').style.display = 'block';
        } catch (e) {
            console.error(e);
            alert("حدث خطأ. تأكد من اتصال الإنترنت وإعدادات Cloudinary.");
        }
        btn.disabled = false;
    }

    async function callRemoveBg(file) {
        const formData = new FormData();
        formData.append('image_file', file);
        const res = await fetch('https://api.remove.bg/v1.0/removebg', {
            method: 'POST', headers: { 'X-Api-Key': REMOVE_BG_KEY }, body: formData
        });
        if(!res.ok) throw new Error("Remove.bg Error");
        return await res.blob();
    }

    async function upgradeWithAI(blob) {
        const formData = new FormData();
        formData.append('file', blob);
        formData.append('upload_preset', CLOUDINARY_PRESET);

        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_NAME}/image/upload`, {
            method: 'POST', body: formData
        });
        const data = await res.json();
        
        // المحرك المطور v2.0:
        // c_limit,w_2000: يضمن حجم كبير 2000 بكسل
        // e_upscale: تكبير بالذكاء الاصطناعي
        // e_sharpen:150: زيادة حدة التفاصيل بشكل ملموس
        // q_auto:best: إجبار السيرفر على أعلى جودة
        return `https://res.cloudinary.com/${CLOUDINARY_NAME}/image/upload/c_limit,w_2000/e_upscale/e_sharpen:150/q_auto:best,f_auto/${data.public_id}.png`;
    }

    async function mergeWithFilters(bg, prod) {
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 2000; canvas.height = 2000;

        // رسم الخلفية
        ctx.drawImage(bg, 0, 0, 2000, 2000);
        
        // حساب الحجم (Product Scaling)
        const scale = Math.min(2000 / prod.width, 2000 / prod.height) * 0.78;
        const w = prod.width * scale;
        const h = prod.height * scale;
        const x = (2000 - w) / 2;
        const y = (2000 - h) / 2;

        // تطبيق فلاتر تحسين الرؤية للمنتج فقط
        ctx.save();
        ctx.shadowColor = "rgba(0,0,0,0.4)";
        ctx.shadowBlur = 45;
        ctx.shadowOffsetY = 25;
        
        // تحسين التباين والتشبع يدوياً لإبراز المنتج
        ctx.filter = 'contrast(1.15) saturate(1.1) brightness(1.02)';
        
        ctx.drawImage(prod, x, y, w, h);
        ctx.restore();

        return new Promise(r => canvas.toBlob(r, 'image/png', 1.0));
    }

    function loadImg(url) {
        return new Promise(r => { const i = new Image(); i.crossOrigin="anonymous"; i.onload=()=>r(i); i.src=url; });
    }

    function updateUI(i, total, text) {
        let p = ((i+1)/total)*100;
        document.getElementById('pFill').style.width = p+'%';
        document.getElementById('pPerc').innerText = Math.round(p)+'%';
        document.getElementById('pText').innerText = text;
    }

    async function downloadZip() {
        const zip = new JSZip();
        processedFiles.forEach(f => zip.file(f.name, f.blob));
        const content = await zip.generateAsync({type:"blob"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(content);
        a.download = `Vezo_AI_Results.zip`;
        a.click();
    }
</script>

</body>
</html>
