<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vezo AI Studio - Full Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --gold: #c5a059; --dark: #1f2937; }
        body { font-family: sans-serif; background: #f3f4f6; padding: 20px; display: flex; justify-content: center; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 550px; text-align: center; }
        
        /* شبكة اختيار الخلفية - 5 خيارات */
        .templates-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; margin: 20px 0; }
        .template-item { border: 2px solid #eee; border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; background: #fff; }
        .template-item img { width: 100%; height: 60px; object-fit: cover; display: block; }
        .template-item span { font-size: 10px; padding: 4px; display: block; font-weight: bold; color: #555; }
        .template-item.active { border-color: var(--gold); transform: scale(1.05); box-shadow: 0 5px 15px rgba(197,160,89,0.3); }
        .template-item.active span { background: var(--gold); color: white; }

        .upload-area { border: 2px dashed #ccc; padding: 25px; border-radius: 20px; margin-bottom: 20px; cursor: pointer; background: #fafafa; }
        .main-btn { background: var(--gold); color: white; border: none; padding: 16px; width: 100%; border-radius: 14px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .main-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
        .zip-btn { background: var(--dark); margin-top: 12px; display: none; }
        
        #status { font-size: 13px; color: #64748b; margin-top: 15px; font-weight: bold; }
        .progress-bar { height: 8px; background: #eee; border-radius: 4px; margin: 15px 0; display: none; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--gold); width: 0%; transition: 0.3s; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:var(--dark);">✨ Vezo AI Studio</h2>
    <p style="font-size:13px; color:#666;">نسخة الـ 5 خلفيات المعتمدة</p>

    <h4 style="text-align:right; margin-bottom:10px;">1. اختر الخلفية:</h4>
    <div class="templates-grid">
        <div class="template-item active" onclick="sel('sadu.png', this)"><img src="sadu.png"><span>سدو</span></div>
        <div class="template-item" onclick="sel('ksanat.png', this)"><img src="ksanat.png"><span>وطني</span></div>
        <div class="template-item" onclick="sel('founding.png', this)"><img src="founding.png"><span>التأسيس</span></div>
        <div class="template-item" onclick="sel('lgrey.png', this)"><img src="lgrey.png"><span>رمادي</span></div>
        <div class="template-item" onclick="sel('grad.png', this)"><img src="grad.png"><span>متدرج</span></div>
    </div>

    <div class="upload-area" onclick="document.getElementById('fileIn').click()">
        <input type="file" id="fileIn" accept="image/*" multiple style="display:none">
        <div id="upTxt">📁 اضغط لرفع صور المنتجات</div>
    </div>

    <div class="progress-bar" id="pBar"><div
