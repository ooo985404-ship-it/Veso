<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<title>Vezo AI - النسخة النهائية</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body { font-family: sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
.card { background: white; max-width: 450px; margin: auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
.opt { border: 2px solid #eee; border-radius: 12px; cursor: pointer; padding: 5px; }
.opt.active { border-color: #c5a059; background: #fff9eb; }
.opt img { width: 100%; height: 60px; object-fit: cover; border-radius: 8px; }
.upload-zone { border: 2px dashed #c5a059; padding: 30px; border-radius: 15px; margin: 20px 0; cursor: pointer; }
.btn { background: #c5a059; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
#dlBtn { background: #1a1a1a; margin-top: 10px; display: none !important; }
#status { margin-top: 15px; font-size: 13px; color: #777; }
canvas { display: none; }
</style>
</head>

<body>

<div class="card">
<h2>Vezo Studio AI</h2>
<p style="font-size:12px; color:#999;">معالجة الصور بجودة فائقة (HD)</p>

<div class="grid">
<div class="opt active" onclick="setBg(this, 'https://images.unsplash.com/photo-1582555172866-f73bb12a2ab3?w=1000')">
<img src="https://images.unsplash.com/photo-1582555172866-f73bb12a2ab3?w=200">
<div style="font-size:10px;">خلفية تراثية</div>
</div>

<div class="opt" onclick="setBg(this, 'https://images.unsplash.com/photo-1516541196182-6bdb0516ed27?w=1000')">
<img src="https://images.unsplash.com/photo-1516541196182-6bdb0516ed27?w=200">
<div style="font-size:10px;">استوديو مودرن</div>
</div>
</div>

<div class="upload-zone" onclick="document.getElementById('f').click()">
<input type="file" id="f" accept="image/*" multiple style="display:none">
<strong>✨ اضغط هنا لرفع الصور</strong>
</div>

<button id="go" class="btn" onclick="process()">🚀 بدء المعالجة</button>
<button id="dlBtn" class="btn" onclick="zipNow()">📥 تحميل الكل (ZIP)</button>

<div id="status">جاهز للاستخدام</div>
</div>

<canvas id="c"></canvas>

<script>

let results = [];
let bg = 'https://images.unsplash.com/photo-1582555172866-f73bb12a2ab3?w=1000';

// ⚠️ عدل هنا فقط
const CONF = {
    RK: '3pocTt3qctAkVgwcwJ4RBE2n',
    CN: 'dt6t6rdop',
    CP: 'vezo_preset' // ← لازم يكون unsigned في Cloudinary
};

function setBg(el, s) {
    bg = s;
    document.querySelectorAll('.opt').forEach(o => o.classList.remove('active'));
    el.classList.add('active');
}

async function process() {
    const files = document.getElementById('f').files;
    if (files.length === 0) return alert("اختر صور!");

    const btn = document.getElementById('go');
    const st = document.getElementById('status');
    btn.disabled = true;
    results = [];

    try {
        const bgImg = await loadImg(bg);

        for (let i = 0; i < files.length; i++) {

            st.innerText = `إزالة الخلفية (${i+1}/${files.length})...`;

            const fd1 = new FormData();
            fd1.append('image_file', files[i]);

            const res1 = await fetch('https://api.remove.bg/v1.0/removebg', {
                method: 'POST',
                headers: { 'X-Api-Key': CONF.RK },
                body: fd1
            });

            if (!res1.ok) throw new Error("مشكلة Remove.bg");

            const blob1 = await res1.blob();

            st.innerText = `رفع وتحسين الجودة...`;

            const fd2 = new FormData();
            fd2.append('file', blob1);
            fd2.append('upload_preset', CONF.CP);

            const res2 = await fetch(`https://api.cloudinary.com/v1_1/${CONF.CN}/upload`, {
                method: 'POST',
                body: fd2
            });

            const data2 = await res2.json();

            if (!res2.ok) {
                console.log(data2);
                throw new Error("Cloudinary preset خطأ");
            }

            const hd = `https://res.cloudinary.com/${CONF.CN}/image/upload/e_enhance,e_upscale,q_auto:best/${data2.public_id}.png`;

            const pImg = await loadImg(hd);

            const cvs = document.getElementById('c');
            const ctx = cvs.getContext('2d');

            cvs.width = 1500;
            cvs.height = 1500;

            ctx.drawImage(bgImg, 0, 0, 1500, 1500);

            const s = Math.min(1150/pImg.width, 1150/pImg.height);
            const w = pImg.width * s;
            const h = pImg.height * s;

            ctx.shadowColor = "rgba(0,0,0,0.3)";
            ctx.shadowBlur = 35;
            ctx.shadowOffsetY = 25;

            ctx.drawImage(pImg, (1500-w)/2, (1500-h)/2, w, h);

            const finalBlob = await new Promise(r => cvs.toBlob(r, 'image/png'));

            results.push({
                name: `Vezo_${i+1}.png`,
                blob: finalBlob
            });

            st.innerText = `تم ${i+1} صور`;
        }

        st.innerHTML = "✅ تم الإنتاج!";
        document.getElementById('dlBtn').style.display = "block";

    } catch (e) {
        alert(e.message);
        st.innerText = "توقف العمل";
    }

    btn.disabled = false;
}

function loadImg(src) {
    return new Promise((res, rej) => {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => res(img);
        img.onerror = () => rej();
        img.src = src;
    });
}

async function zipNow() {
    const zip = new JSZip();

    results.forEach(r => {
        zip.file(r.name, r.blob);
    });

    const blob = await zip.generateAsync({type:"blob"});

    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = "Vezo_Images.zip";
    a.click();
}

</script>

</body>
</html>
