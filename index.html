<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Vezo Studio AI - التحديث الجديد</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .card { background: white; max-width: 450px; margin: auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .upload-zone { border: 2px dashed #c5a059; padding: 30px; border-radius: 15px; margin: 20px 0; cursor: pointer; }
        .btn { background: #c5a059; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #dlBtn { background: #1a1a1a; margin-top: 10px; display: none !important; }
        #status { margin-top: 15px; font-size: 13px; color: #777; font-weight: bold; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Vezo Studio AI</h2>
    <div class="upload-zone" onclick="document.getElementById('f').click()">
        <input type="file" id="f" accept="image/*" multiple style="display:none">
        <strong>✨ اضغط لرفع الصور الجديدة</strong>
    </div>

    <button id="go" class="btn" onclick="process()">🚀 بدء المعالجة (بالمفتاح الجديد)</button>
    <button id="dlBtn" class="btn" onclick="zipNow()">📥 تحميل الكل (ZIP)</button>
    
    <div id="status">جاهز للاستخدام بالمفتاح الجديد</div>
</div>

<canvas id="c"></canvas>

<script>
    let results = [];

    // البيانات المحدثة بناءً على طلبك وصورك
    const CONF = {
        RK: 'Kxns19EXihefmvtjJBnANqHb', // المفتاح الجديد الذي أرسلته
        CN: 'dt6t6rdop',               // اسم السحاب من صورتك
        CP: 'vezo_preset'              // الـ Preset من صورتك
    };

    async function process() {
        const files = document.getElementById('f').files;
        if (files.length === 0) return alert("يرجى اختيار صور!");

        const btn = document.getElementById('go');
        const st = document.getElementById('status');
        btn.disabled = true;
        results = [];

        try {
            for (let i = 0; i < files.length; i++) {
                st.innerText = `جاري مسح الخلفية بالمفتاح الجديد (${i+1}/${files.length})...`;

                // 1. مسح الخلفية (Remove.bg)
                const fd1 = new FormData();
                fd1.append('image_file', files[i]);
                const res1 = await fetch('https://api.remove.bg/v1.0/removebg', {
                    method: 'POST', 
                    headers: { 'X-Api-Key': CONF.RK }, 
                    body: fd1
                });
                
                if (!res1.ok) {
                    const errData = await res1.json();
                    throw new Error(`خطأ Remove.bg: ${errData.errors[0].title}`);
                }
                const blob1 = await res1.blob();

                st.innerText = `تحسين الجودة والرفع...`;

                // 2. الرفع لـ Cloudinary (بدون إرسال API Key لتجنب تعارض الـ Unsigned)
                const fd2 = new FormData();
                fd2.append('file', blob1);
                fd2.append('upload_preset', CONF.CP);
                
                const res2 = await fetch(`https://api.cloudinary.com/v1_1/${CONF.CN}/image/upload`, {
                    method: 'POST', 
                    body: fd2
                });
                
                const data2 = await res2.json();
                if (!res2.ok) throw new Error(`خطأ Cloudinary: ${data2.error.message}`);
                
                // رابط التحسين HD
                const hd = `https://res.cloudinary.com/${CONF.CN}/image/upload/e_upscale,q_auto:best/${data2.public_id}.png`;
                await createFinalImage(hd, i);
            }

            st.innerHTML = "<b style='color:green'>✅ اكتملت المعالجة بالمفتاح الجديد!</b>";
            document.getElementById('dlBtn').style.setProperty('display', 'block', 'important');
        } catch (e) {
            alert(e.message);
            st.innerText = "حدث خطأ أثناء المعالجة.";
        }
        btn.disabled = false;
    }

    async function createFinalImage(url, index) {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = url;
        await new Promise(r => img.onload = r);
        
        const cvs = document.getElementById('c');
        const ctx = cvs.getContext('2d');
        cvs.width = 1500; cvs.height = 1500;
        
        // رسم خلفية بيضاء افتراضية
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, 1500, 1500);
        
        // رسم المنتج في المنتصف
        const s = Math.min(1100/img.width, 1100/img.height);
        const w = img.width * s, h = img.height * s;
        ctx.drawImage(img, (1500-w)/2, (1500-h)/2, w, h);
        
        const blob = await new Promise(r => cvs.toBlob(r, 'image/png'));
        results.push({ name: `Vezo_NewKey_${index+1}.png`, blob: blob });
    }

    async function zipNow() {
        const zip = new JSZip();
        results.forEach(r => zip.file(r.name, r.blob));
        const content = await zip.generateAsync({type:"blob"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(content);
        a.download = "Vezo_Updates.zip";
        a.click();
    }
</script>

</body>
</html>
