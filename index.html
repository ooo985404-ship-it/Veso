<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vezo AI Pro - Glass Design</title>
    <style>
        :root { --primary: #c5a059; --saudi: #006C35; }
        
        /* خلفية الصفحة زجاجية انسيابية */
        body { 
            font-family: sans-serif; 
            background: linear-gradient(135deg, #cfd9df 0%, #e2ebf0 100%);
            background-attachment: fixed;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; 
        }

        /* تصميم الكارت الزجاجي */
        .card { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 2rem; border-radius: 30px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.1); 
            border: 1px solid rgba(255,255,255,0.3);
            width: 90%; max-width: 450px; text-align: center; 
        }
        
        .preview-container { 
            position: relative; width: 100%; min-height: 250px; 
            border-radius: 20px; margin-top: 15px; overflow: hidden; 
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.5);
        }
        #resultImg { max-width: 100%; max-height: 400px; display: none; z-index: 5; }
        
        /* أزرار النماذج */
        .bg-options { display: none; justify-content: space-between; margin-top: 15px; gap: 8px; flex-wrap: wrap; }
        .bg-btn { flex: 1; min-width: 80px; padding: 10px 5px; font-size: 11px; border: 2px solid transparent; border-radius: 10px; cursor: pointer; color: white; font-weight: bold; transition: 0.3s; }
        .bg-btn.active { border-color: var(--primary); transform: translateY(-3px); }
        
        .btn-saudi { background: var(--saudi); }
        .btn-glass { background: rgba(255, 255, 255, 0.4); color: #333; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.6); }
        .btn-white { background: #fff; color: #333; border: 1px solid #ddd; }
        .btn-black { background: #000; color: #fff; }

        .main-btn { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #status { margin: 10px 0; font-size: 13px; color: #444; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin:0; color:#2c3e50;">💎 Vezo AI Glass</h2>
    <p style="font-size:12px; color:#555; margin-bottom:15px">تأثير الزجاج الشفاف الاحترافي</p>
    
    <input type="file" id="imageInput" accept="image/*" style="width:100%; margin-bottom:10px;">
    <button id="processBtn" class="main-btn" onclick="processImage()">إزالة الخلفية</button>
    
    <div id="status">جاهز للاستخدام</div>

    <div class="preview-container" id="previewBox">
        <img id="resultImg" crossorigin="anonymous">
    </div>

    <div class="bg-options" id="bgOptions">
        <button class="bg-btn btn-glass" onclick="applyBg('glass', this)">زجاجي</button>
        <button class="bg-btn btn-saudi" onclick="applyBg('#006C35', this)">Saudi</button>
        <button class="bg-btn btn-white" onclick="applyBg('#ffffff', this)">أبيض</button>
        <button class="bg-btn btn-black" onclick="applyBg('#000000', this)">سدو</button>
    </div>

    <button id="dlBtn" style="display:none; background:#2c3e50" class="main-btn" onclick="downloadCombined()">📥 تحميل النتيجة</button>
    <canvas id="exportCanvas"></canvas>
</div>

<script>
    let currentColor = 'transparent';

    async function processImage() {
        const fileInput = document.getElementById('imageInput');
        const status = document.getElementById('status');
        const resultImg = document.getElementById('resultImg');
        const bgOptions = document.getElementById('bgOptions');

        if (!fileInput.files[0]) return alert("اختر صورة");
        status.innerText = "⏳ جاري المعالجة الرقمية...";
        
        const formData = new FormData();
        formData.append('image_file', fileInput.files[0]);

        try {
            const response = await fetch('https://api.remove.bg/v1.0/removebg', {
                method: 'POST',
                headers: { 'X-Api-Key': '3pocTt3qctAkVgwcwJ4RBE2n' },
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                resultImg.src = URL.createObjectURL(blob);
                resultImg.onload = () => {
                    resultImg.style.display = 'block';
                    bgOptions.style.display = 'flex';
                    document.getElementById('dlBtn').style.display = 'block';
                    status.innerText = "✨ تمت! اختر شكل الخلفية";
                };
            } else {
                status.innerText = "❌ فشل الاتصال، تأكد من المفتاح";
            }
        } catch (e) {
            status.innerText = "❌ حدث خطأ تقني";
        }
    }

    function applyBg(color, btn) {
        currentColor = color;
        const box = document.getElementById('previewBox');
        document.querySelectorAll('.bg-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        if (color === 'glass') {
            box.style.backgroundColor = "rgba(255, 255, 255, 0.4)";
            box.style.backdropFilter = "blur(10px)";
            currentColor = "#f8f9fa"; // لون تقريبي للدمج
        } else {
            box.style.backdropFilter = "none";
            box.style.backgroundColor = color;
        }
    }

    function downloadCombined() {
        const img = document.getElementById('resultImg');
        const canvas = document.getElementById('exportCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;

        if (currentColor !== 'transparent') {
            ctx.fillStyle = currentColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        ctx.drawImage(img, 0, 0);
        const link = document.createElement('a');
        link.download = `vezo_glass_${Date.now()}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
    }
</script>

</body>
</html>
