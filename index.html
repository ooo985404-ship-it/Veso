<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Vezo Studio AI - إصلاح الربط</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .card { background: white; max-width: 450px; margin: auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .upload-zone { border: 2px dashed #c5a059; padding: 30px; border-radius: 15px; margin: 20px 0; cursor: pointer; }
        .btn { background: #c5a059; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #dlBtn { background: #1a1a1a; margin-top: 10px; display: none !important; }
        #status { margin-top: 15px; font-size: 13px; color: #777; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Vezo Studio AI</h2>
    <div class="upload-zone" onclick="document.getElementById('f').click()">
        <input type="file" id="f" accept="image/*" multiple style="display:none">
        <strong>✨ اضغط هنا لرفع الصور</strong>
    </div>
    <button id="go" class="btn" onclick="process()">🚀 بدء المعالجة</button>
    <button id="dlBtn" class="btn" onclick="zipNow()">📥 تحميل الكل (ZIP)</button>
    <div id="status">جاهز للاستخدام</div>
</div>

<canvas id="c"></canvas>

<script>
    let results = [];
    // الإعدادات مأخوذة من صورك رقم 3 و 12
    const CONF = {
        RK: '3pocTt3qctAkVgwcwJ4RBE2n', // Remove.bg API
        CN: 'dt6t6rdop',               // Cloud Name من صورتك رقم 3
        CP: 'vezo_preset'              // Preset Name من صورتك رقم 12
    };

    async function process() {
        const files = document.getElementById('f').files;
        if (files.length === 0) return alert("اختر صور!");
        const st = document.getElementById('status');
        results = [];

        try {
            for (let i = 0; i < files.length; i++) {
                st.innerText = `معالجة الخلفية (${i+1}/${files.length})...`;
                
                // 1. مسح الخلفية
                const fd1 = new FormData();
                fd1.append('image_file', files[i]);
                const res1 = await fetch('https://api.remove.bg/v1.0/removebg', {
                    method: 'POST', headers: { 'X-Api-Key': CONF.RK }, body: fd1
                });
                if (!res1.ok) throw new Error("مشكلة في مفتاح مسح الخلفية");
                const blob1 = await res1.blob();

                st.innerText = `رفع وتحسين الجودة...`;

                // 2. الرفع لـ Cloudinary (بدون مفتاح API لأنه Unsigned)
                const fd2 = new FormData();
                fd2.append('file', blob1);
                fd2.append('upload_preset', CONF.CP);

                const res2 = await fetch(`https://api.cloudinary.com/v1_1/${CONF.CN}/image/upload`, {
                    method: 'POST', body: fd2
                });

                const data2 = await res2.json();
                if (!res2.ok) throw new Error(`خطأ في الرفع: ${data2.error.message}`);

                // 3. الرسم النهائي (HD)
                const hdUrl = `https://res.cloudinary.com/${CONF.CN}/image/upload/e_upscale,q_auto:best/${data2.public_id}.png`;
                await addToZip(hdUrl, i);
                
                st.innerText = `تمت معالجة ${i+1} صور`;
            }
            st.innerHTML = "✅ اكتمل العمل!";
            document.getElementById('dlBtn').style.setProperty('display', 'block', 'important');
        } catch (e) {
            alert("حدث خطأ: " + e.message);
            st.innerText = "توقف العمل";
        }
    }

    async function addToZip(url, index) {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = url;
        await new Promise(r => img.onload = r);
        const cvs = document.getElementById('c');
        const ctx = cvs.getContext('2d');
        cvs.width = 1500; cvs.height = 1500;
        ctx.drawImage(img, 0, 0, 1500, 1500);
        const b = await new Promise(r => cvs.toBlob(r, 'image/png'));
        results.push({ name: `Vezo_${index+1}.png`, blob: b });
    }

    async function zipNow() {
        const zip = new JSZip();
        results.forEach(r => zip.file(r.name, r.blob));
        const content = await zip.generateAsync({type:"blob"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(content);
        a.download = "Results.zip";
        a.click();
    }
</script>
</body>
</html>
