<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vezo AI Studio - Drop Shadow</title>
    <style>
        :root { --primary: #c5a059; --saudi: #006C35; }
        body { 
            font-family: sans-serif; background: #eef2f3;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; 
        }
        .card { 
            background: white; padding: 2rem; border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 90%; max-width: 450px; text-align: center; 
        }
        .preview-container { 
            position: relative; width: 100%; min-height: 280px; 
            border-radius: 15px; margin-top: 15px; overflow: hidden; 
            display: flex; align-items: center; justify-content: center;
            background: white; border: 1px solid #ddd;
        }
        /* تطبيق الظل على المعاينة */
        #resultImg { max-width: 85%; max-height: 350px; display: none; transition: 0.3s; }
        
        .controls { display: none; margin-top: 20px; }
        .bg-options { display: flex; justify-content: space-between; gap: 5px; margin-bottom: 15px; }
        .bg-btn { flex: 1; padding: 10px 5px; border-radius: 8px; cursor: pointer; color: white; border: none; font-size: 11px; font-weight: bold; }
        
        .shadow-control { margin: 15px 0; text-align: right; }
        input[type="range"] { width: 100%; accent-color: var(--primary); }

        .main-btn { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #status { margin: 10px 0; font-size: 13px; color: #666; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin:0">📸 Vezo AI Studio</h2>
    <p style="font-size:12px; color:#888; margin-bottom:15px">تأثيرات الظل والخلفيات الاحترافية</p>
    
    <input type="file" id="imageInput" accept="image/*" style="width:100%; margin-bottom:10px;">
    <button id="processBtn" class="main-btn" onclick="processImage()">إزالة الخلفية</button>
    
    <div id="status">جاهز للاستخدام</div>

    <div class="preview-container" id="previewBox">
        <img id="resultImg" crossorigin="anonymous">
    </div>

    <div class="controls" id="controlsSection">
        <div class="shadow-control">
            <label style="font-size: 12px; font-weight: bold;">قوة الظل الواقعي:</label>
            <input type="range" id="shadowRange" min="0" max="50" value="15" oninput="updateShadow()">
        </div>

        <div class="bg-options">
            <button class="bg-btn" style="background:#006C35" onclick="setBg('#006C35')">Saudi</button>
            <button class="bg-btn" style="background:#fff; color:#333; border:1px solid #ddd" onclick="setBg('#ffffff')">أبيض</button>
            <button class="bg-btn" style="background:#000" onclick="setBg('#000000')">سدو</button>
            <button class="bg-btn" style="background:#888" onclick="setBg('transparent')">شفاف</button>
        </div>

        <button class="main-btn" style="background:#2c3e50" onclick="downloadFull()">📥 تحميل بجودة الاستوديو</button>
    </div>
    
    <canvas id="exportCanvas"></canvas>
</div>

<script>
    let currentColor = '#ffffff';

    async function processImage() {
        const fileInput = document.getElementById('imageInput');
        const status = document.getElementById('status');
        const resultImg = document.getElementById('resultImg');
        const controls = document.getElementById('controlsSection');

        if (!fileInput.files[0]) return alert("اختر صورة");
        status.innerText = "⏳ جاري المعالجة الرقمية...";
        
        const formData = new FormData();
        formData.append('image_file', fileInput.files[0]);

        try {
            const response = await fetch('https://api.remove.bg/v1.0/removebg', {
                method: 'POST',
                headers: { 'X-Api-Key': '3pocTt3qctAkVgwcwJ4RBE2n' },
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                resultImg.src = URL.createObjectURL(blob);
                resultImg.onload = () => {
                    resultImg.style.display = 'block';
                    controls.style.display = 'block';
                    updateShadow();
                    status.innerText = "✨ تمت! تحكم في الظل والخلفية";
                };
            } else {
                status.innerText = "❌ خطأ في الاتصال";
            }
        } catch (e) {
            status.innerText = "❌ فشل النظام";
        }
    }

    function updateShadow() {
        const val = document.getElementById('shadowRange').value;
        const img = document.getElementById('resultImg');
        img.style.filter = `drop-shadow(0px ${val/2}px ${val}px rgba(0,0,0,0.5))`;
    }

    function setBg(color) {
        currentColor = color;
        const box = document.getElementById('previewBox');
        if (color === 'transparent') {
            box.style.background = "white"; // للعرض فقط
            box.style.backgroundImage = "linear-gradient(45deg, #eee 25%, transparent 25%), linear-gradient(-45deg, #eee 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #eee 75%), linear-gradient(-45deg, transparent 75%, #eee 75%)";
            box.style.backgroundSize = "20px 20px";
        } else {
            box.style.backgroundImage = "none";
            box.style.backgroundColor = color;
        }
    }

    function downloadFull() {
        const img = document.getElementById('resultImg');
        const canvas = document.getElementById('exportCanvas');
        const ctx = canvas.getContext('2d');
        const shadowVal = parseInt(document.getElementById('shadowRange').value);

        // إضافة مساحة للظل في الكانفاس
        canvas.width = img.naturalWidth + 100;
        canvas.height = img.naturalHeight + 100;

        // 1. رسم الخلفية
        if (currentColor !== 'transparent') {
            ctx.fillStyle = currentColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // 2. رسم الظل برمجياً
        ctx.shadowColor = "rgba(0,0,0,0.5)";
        ctx.shadowBlur = shadowVal;
        ctx.shadowOffsetY = shadowVal / 2;

        // 3. رسم الصورة (الظل سيظهر تلقائياً تحتها)
        ctx.drawImage(img, 50, 50, img.naturalWidth, img.naturalHeight);

        const link = document.createElement('a');
        link.download = `vezo_studio_${Date.now()}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
    }
</script>

</body>
</html>
