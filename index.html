<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vezo AI - Batch Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --primary: #c5a059; --dark: #1f2937; }
        body { font-family: sans-serif; background: #f3f4f6; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 2rem; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        
        .upload-area { border: 2px dashed #ccc; padding: 30px; border-radius: 20px; margin-bottom: 20px; cursor: pointer; transition: 0.3s; }
        .upload-area:hover { border-color: var(--primary); background: #fffcf5; }
        
        .progress-container { display: none; margin: 20px 0; text-align: right; }
        .progress-bar { width: 100%; height: 10px; background: #eee; border-radius: 5px; overflow: hidden; margin-top: 5px; }
        .progress-fill { width: 0%; height: 100%; background: var(--primary); transition: 0.3s; }
        
        .results-list { max-height: 200px; overflow-y: auto; margin: 15px 0; border: 1px solid #eee; border-radius: 10px; display: none; }
        .result-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }
        
        .main-btn { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .main-btn:disabled { background: #ccc; cursor: not-allowed; }
        
        #status { font-size: 14px; color: #666; margin-bottom: 10px; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>📦 Vezo Batch Studio</h2>
    <p style="font-size:12px; color:#888; margin-bottom:20px">معالجة حتى 10 صور دفعة واحدة وتحميلها في ملف ZIP</p>

    <div class="upload-area" onclick="document.getElementById('imageInput').click()">
        <input type="file" id="imageInput" accept="image/*" multiple style="display:none">
        <div id="uploadText">اضغط هنا لاختيار الصور (يمكنك اختيار عدة صور)</div>
    </div>

    <div id="status">جاهز للاستخدام</div>

    <div class="progress-container" id="progressSection">
        <div style="display:flex; justify-content:space-between; font-size:12px;">
            <span id="progressText">جاري المعالجة: 0/0</span>
            <span id="percentText">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div class="results-list" id="resultsList"></div>

    <button id="processBtn" class="main-btn" onclick="startBatchProcess()">🚀 بدء المعالجة الجماعية</button>
    <button id="zipBtn" class="main-btn" style="display:none; background:var(--dark)" onclick="downloadZip()">📥 تحميل الكل (ZIP)</button>
</div>

<canvas id="tempCanvas"></canvas>

<script>
    let processedImages = [];
    const API_KEY = '3pocTt3qctAkVgwcwJ4RBE2n';

    async function startBatchProcess() {
        const fileInput = document.getElementById('imageInput');
        const files = fileInput.files;
        if (files.length === 0) return alert("الرجاء اختيار صور أولاً");
        if (files.length > 15) return alert("الحد الأقصى هو 15 صورة في المرة الواحدة");

        // تهيئة الواجهة
        document.getElementById('processBtn').disabled = true;
        document.getElementById('progressSection').style.display = 'block';
        document.getElementById('resultsList').style.display = 'block';
        document.getElementById('resultsList').innerHTML = '';
        processedImages = [];

        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const percentText = document.getElementById('percentText');

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            progressText.innerText = `جاري المعالجة: ${i + 1}/${files.length}`;
            
            try {
                const resultBlob = await removeBgRequest(file);
                if (resultBlob) {
                    processedImages.push({ name: file.name.split('.')[0] + '_vezo.png', blob: resultBlob });
                    addResultItem(file.name, "✅ اكتملت");
                }
            } catch (e) {
                addResultItem(file.name, "❌ فشلت");
            }

            // تحديث شريط التقدم
            const percent = ((i + 1) / files.length) * 100;
            progressFill.style.width = percent + '%';
            percentText.innerText = Math.round(percent) + '%';
        }

        document.getElementById('status').innerText = "✨ تمت معالجة جميع الصور!";
        document.getElementById('zipBtn').style.display = 'block';
        document.getElementById('processBtn').disabled = false;
    }

    async function removeBgRequest(file) {
        const formData = new FormData();
        formData.append('image_file', file);
        formData.append('size', 'auto');

        const response = await fetch('https://api.remove.bg/v1.0/removebg', {
            method: 'POST',
            headers: { 'X-Api-Key': API_KEY },
            body: formData
        });

        if (response.ok) return await response.blob();
        throw new Error('API Error');
    }

    function addResultItem(name, status) {
        const list = document.getElementById('resultsList');
        const item = document.createElement('div');
        item.className = 'result-item';
        item.innerHTML = `<span>${name}</span> <b>${status}</b>`;
        list.appendChild(item);
        list.scrollTop = list.scrollHeight;
    }

    async function downloadZip() {
        const zip = new JSZip();
        processedImages.forEach(img => {
            zip.file(img.name, img.blob);
        });

        const content = await zip.generateAsync({ type: "blob" });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = `Vezo_Batch_${Date.now()}.zip`;
        link.click();
    }

    document.getElementById('imageInput').onchange = function() {
        const count = this.files.length;
        document.getElementById('uploadText').innerText = `تم اختيار ${count} صور`;
    };
</script>

</body>
</html>
