<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Vezo AI - الإصلاح النهائي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .card { background: white; max-width: 450px; margin: auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .upload-zone { border: 2px dashed #c5a059; padding: 30px; border-radius: 15px; margin: 20px 0; cursor: pointer; }
        .btn { background: #c5a059; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #dlBtn { background: #1a1a1a; margin-top: 10px; display: none !important; }
        #status { margin-top: 15px; font-size: 13px; color: #777; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Vezo Studio AI</h2>
    <div class="upload-zone" onclick="document.getElementById('f').click()">
        <input type="file" id="f" accept="image/*" multiple style="display:none">
        <strong>✨ اضغط هنا لرفع الصور</strong>
    </div>

    <button id="go" class="btn" onclick="process()">🚀 بدء المعالجة والتحسين</button>
    <button id="dlBtn" class="btn" onclick="zipNow()">📥 تحميل الكل (ZIP)</button>
    
    <div id="status">جاهز للاستخدام</div>
</div>

<canvas id="c"></canvas>

<script>
    let results = [];

    // البيانات المستخرجة من صورك المرفقة
    const CONF = {
        RK: '3pocTt3qctAkVgwcwJ4RBE2n', // مفتاح Remove.bg
        CN: 'dt6t6rdop',               // اسم السحاب (Cloud Name)
        CP: 'vezo_preset'              // اسم الـ Preset غير الموقع
    };

    async function process() {
        const files = document.getElementById('f').files;
        if (files.length === 0) return alert("يرجى اختيار صور!");

        const btn = document.getElementById('go');
        const st = document.getElementById('status');
        btn.disabled = true;
        results = [];

        try {
            for (let i = 0; i < files.length; i++) {
                st.innerText = `جاري مسح الخلفية (${i+1}/${files.length})...`;

                // 1. مسح الخلفية
                const fd1 = new FormData();
                fd1.append('image_file', files[i]);
                const res1 = await fetch('https://api.remove.bg/v1.0/removebg', {
                    method: 'POST', headers: { 'X-Api-Key': CONF.RK }, body: fd1
                });
                
                if (!res1.ok) throw new Error("تأكد من مفتاح Remove.bg");
                const blob1 = await res1.blob();

                st.innerText = `جاري رفع وتحسين الجودة (Cloudinary)...`;

                // 2. الرفع لـ Cloudinary بطريقة Unsigned (لا تحتاج API Key هنا)
                const fd2 = new FormData();
                fd2.append('file', blob1);
                fd2.append('upload_preset', CONF.CP); // استخدام الـ Preset غير الموقع
                
                const res2 = await fetch(`https://api.cloudinary.com/v1_1/${CONF.CN}/image/upload`, {
                    method: 'POST', body: fd2
                });
                
                const data2 = await res2.json();
                if (!res2.ok) throw new Error(`Cloudinary: ${data2.error.message}`);
                
                // رابط التحسين HD
                const hd = `https://res.cloudinary.com/${CONF.CN}/image/upload/e_upscale,q_auto:best/${data2.public_id}.png`;
                await addToResults(hd, i);
            }

            st.innerHTML = "<b style='color:green'>✅ تم الإنتاج بنجاح!</b>";
            document.getElementById('dlBtn').style.setProperty('display', 'block', 'important');
        } catch (e) {
            alert(e.message);
            st.innerText = "توقف العمل.";
        }
        btn.disabled = false;
    }

    async function addToResults(url, i) {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = url;
        await new Promise(r => img.onload = r);
        
        const cvs = document.getElementById('c');
        const ctx = cvs.getContext('2d');
        cvs.width = 1500; cvs.height = 1500;
        ctx.drawImage(img, 0, 0, 1500, 1500);
        
        const b = await new Promise(r => cvs.toBlob(r, 'image/png'));
        results.push({ name: `Vezo_${i+1}.png`, blob: b });
    }

    async function zipNow() {
        const zip = new JSZip();
        results.forEach(r => zip.file(r.name, r.blob));
        const blob = await zip.generateAsync({type:"blob"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "Vezo_Pro.zip";
        a.click();
    }
</script>

</body>
</html>
