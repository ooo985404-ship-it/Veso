<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Vezo Studio AI - Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; text-align: center; padding: 20px; }
        .card { background: white; max-width: 420px; margin: auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .upload-zone { border: 2px dashed #c5a059; padding: 30px; border-radius: 15px; margin: 20px 0; cursor: pointer; background: #fffcf9; }
        .btn { background: #c5a059; color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        #dlBtn { background: #1a1a1a; margin-top: 10px; display: none !important; }
        #status { margin-top: 15px; font-size: 13px; color: #d9534f; font-weight: bold; min-height: 20px; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Vezo Studio AI</h2>
    <div class="upload-zone" onclick="document.getElementById('f').click()">
        <input type="file" id="f" accept="image/*" multiple style="display:none">
        <div style="font-size:40px; margin-bottom:10px;">📸</div>
        <strong>اضغط لرفع صور المنتجات</strong>
    </div>

    <button id="go" class="btn" onclick="process()">🚀 بدء المعالجة والتحسين</button>
    <button id="dlBtn" class="btn" onclick="zipNow()">📥 تحميل النتائج (ZIP)</button>
    
    <div id="status">جاهز للعمل بالمفتاح الجديد</div>
</div>

<canvas id="c"></canvas>

<script>
    let results = [];

    // الإعدادات مأخوذة بدقة من صور الإعدادات الخاصة بك
    const CONFIG = {
        RK: 'Kxns19EXihefmvtjJBnANqHb', // مفتاح Remove.bg الجديد الخاص بك
        CN: 'dt6t6rdop',               // Cloud Name الخاص بك
        CP: 'vezo_preset'              // اسم الـ Preset غير الموقع
    };

    async function process() {
        const files = document.getElementById('f').files;
        if (files.length === 0) return alert("لطفاً اختر الصور أولاً");

        const btn = document.getElementById('go');
        const st = document.getElementById('status');
        btn.disabled = true;
        results = [];
        st.style.color = "#666";

        try {
            for (let i = 0; i < files.length; i++) {
                st.innerText = `جاري مسح الخلفية (${i+1}/${files.length})...`;

                // 1. مسح الخلفية باستخدام المفتاح الجديد
                const fd1 = new FormData();
                fd1.append('image_file', files[i]);
                const res1 = await fetch('https://api.remove.bg/v1.0/removebg', {
                    method: 'POST', headers: { 'X-Api-Key': CONFIG.RK }, body: fd1
                });
                
                if (!res1.ok) throw new Error("مشكلة في رصيد مفتاح مسح الخلفية");
                const blob1 = await res1.blob();

                st.innerText = `جاري الرفع والتحسين HD...`;

                // 2. الرفع لـ Cloudinary (طريقة الرفع غير الموقع - Unsigned)
                // تنبيه: لا يتم إرسال API Key هنا لتجنب خطأ "Unknown API key"
                const fd2 = new FormData();
                fd2.append('file', blob1);
                fd2.append('upload_preset', CONFIG.CP);
                
                const res2 = await fetch(`https://api.cloudinary.com/v1_1/${CONFIG.CN}/image/upload`, {
                    method: 'POST', body: fd2
                });
                
                const data2 = await res2.json();
                if (!res2.ok) throw new Error(`خطأ كلوديناري: ${data2.error.message}`);
                
                // رابط التحسين HD النهائي
                const finalUrl = `https://res.cloudinary.com/${CONFIG.CN}/image/upload/e_upscale,q_auto:best/${data2.public_id}.png`;
                await addToResults(finalUrl, i);
                st.innerText = `اكتملت معالجة صورة ${i+1}`;
            }

            st.style.color = "green";
            st.innerHTML = "✨ تم المعالجة والتحسين بنجاح!";
            document.getElementById('dlBtn').style.setProperty('display', 'block', 'important');
        } catch (e) {
            st.style.color = "#d9534f";
            st.innerText = `⚠️ عذراً: ${e.message}`;
        }
        btn.disabled = false;
    }

    async function addToResults(url, idx) {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = url;
        await new Promise(r => img.onload = r);
        
        const cvs = document.getElementById('c');
        const ctx = cvs.getContext('2d');
        cvs.width = 1500; cvs.height = 1500;
        
        ctx.fillStyle = "white"; 
        ctx.fillRect(0, 0, 1500, 1500);
        
        const s = Math.min(1100/img.width, 1100/img.height);
        const w = img.width * s, h = img.height * s;
        ctx.drawImage(img, (1500-w)/2, (1500-h)/2, w, h);
        
        const blob = await new Promise(r => cvs.toBlob(r, 'image/png'));
        results.push({ name: `Vezo_Studio_${idx+1}.png`, blob: blob });
    }

    async function zipNow() {
        const zip = new JSZip();
        results.forEach(r => zip.file(r.name, r.blob));
        const b = await zip.generateAsync({type:"blob"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(b);
        a.download = "Vezo_Products.zip";
        a.click();
    }
</script>

</body>
</html>
