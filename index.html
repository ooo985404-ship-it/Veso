<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vezo AI Studio - Final Corrected</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --gold: #c5a059; --dark: #1f2937; --bg: #f8fafc; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        
        .card { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); text-align: center; border: 1px solid #edf2f7; }
        
        h2 { color: var(--dark); margin-bottom: 5px; font-size: 24px; }
        .subtitle { font-size: 13px; color: #94a3b8; margin-bottom: 25px; }

        .section-title { text-align: right; font-size: 14px; font-weight: bold; color: var(--dark); margin-bottom: 12px; display: block; }
        
        /* شبكة الخلفيات الخمس */
        .templates-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; margin-bottom: 25px; }
        
        .template-item { border: 2px solid #f1f5f9; border-radius: 15px; overflow: hidden; cursor: pointer; transition: all 0.3s ease; background: #fff; }
        .template-item img { width: 100%; height: 60px; object-fit: cover; display: block; }
        .template-item span { font-size: 11px; padding: 5px 0; display: block; font-weight: 600; color: #64748b; background: #f8fafc; }
        
        .template-item.active { border-color: var(--gold); transform: translateY(-3px); box-shadow: 0 10px 15px rgba(197,160,89,0.2); }
        .template-item.active span { background: var(--gold); color: white; }

        /* منطقة الرفع */
        .upload-area { border: 2px dashed #e2e8f0; padding: 25px; border-radius: 20px; margin-bottom: 20px; cursor: pointer; background: #fdfdfd; }
        .upload-icon { font-size: 24px; display: block; margin-bottom: 8px; }
        #upTxt { font-size: 13px; color: #64748b; font-weight: 500; }

        /* الأزرار - التأكد من ظهورها */
        .main-btn { background: var(--gold); color: white; border: none; padding: 18px; width: 100%; border-radius: 16px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; display: block; margin-top: 10px; }
        .main-btn:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; }
        
        .zip-btn { background: var(--dark); display: none; } /* يظهر فقط بعد المعالجة */

        .progress-container { margin: 20px 0; display: none; }
        .progress-bar { height: 10px; background: #f1f5f9; border-radius: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--gold); width: 0%; transition: 0.4s; }
        
        #status { font-size: 13px; color: #64748b; margin-top: 15px; font-weight: 600; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>✨ Vezo AI Studio</h2>
    <p class="subtitle">استوديو احترافي لصور المنتجات</p>

    <label class="section-title">1. اختر خلفية التصميم:</label>
    <div class="templates-grid">
        <div class="template-item active" onclick="sel('sadu.png', this)"><img src="sadu.png"><span>سدو</span></div>
        <div class="template-item" onclick="sel('ksanat.png', this)"><img src="ksanat.png"><span>وطني</span></div>
        <div class="template-item" onclick="sel('founding.png', this)"><img src="founding.png"><span>التأسيس</span></div>
        <div class="template-item" onclick="sel('lgrey.png', this)"><img src="lgrey.png"><span>رمادي</span></div>
        <div class="template-item" onclick="sel('grad.png', this)"><img src="grad.png"><span>متدرج</span></div>
    </div>

    <label class="section-title">2. ارفع صور المنتجات:</label>
    <div class="upload-area" onclick="document.getElementById('fileIn').click()">
        <input type="file" id="fileIn" accept="image/*" multiple style="display:none">
        <span class="upload-icon">📁</span>
        <div id="upTxt">اضغط لاختيار الصور</div>
    </div>

    <div class="progress-container" id="pCont">
        <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
    </div>

    <button id="go" class="main-btn" onclick="process()">🚀 بدء المعالجة الجماعية</button>
    
    <button id="dl" class="main-btn zip-btn" onclick="downloadAll()">📥 تحميل الملف المضغوط (ZIP)</button>
    
    <div id="status">جاهز للبدء</div>
</div>

<canvas id="mc"></canvas>

<script>
    let results = [];
    let currentBg = 'sadu.png';
    const API_KEY = 'Sk_pr_vezo_3a42725de0f6914ad768eaaaf2eaf96d2786bab3';

    function sel(url, el) {
        currentBg = url;
        document.querySelectorAll('.template-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('status').innerText = "تم اختيار خلفية: " + el.innerText;
    }

    async function process() {
        const files = document.getElementById('fileIn').files;
        if (!files.length) return alert("يرجى رفع الصور أولاً");

        const btn = document.getElementById('go');
        const dlBtn = document.getElementById('dl');
        const st = document.getElementById('status');
        const pCont = document.getElementById('pCont');
        const pFill = document.getElementById('pFill');

        btn.disabled = true;
        dlBtn.style.display = 'none'; // إخفاء زر التحميل القديم عند بدء معالجة جديدة
        pCont.style.display = 'block';
        results = [];

        try {
            const bgImg = await loadImg(currentBg);

            for (let i = 0; i < files.length; i++) {
                st.innerText = `جاري معالجة ${i+1} من ${files.length}...`;
                
                const fd = new FormData();
                fd.append('image_file', files[i]);
                const res = await fetch('https://sdk.photoroom.com/v1/segment', {
                    method: 'POST',
                    headers: { 'x-api-key': API_KEY },
                    body: fd
                });

                if(!res.ok) throw new Error("رصيد API غير كافي");

                const blob = await res.blob();
                const blobUrl = URL.createObjectURL(blob);
                const prodImg = await loadImg(blobUrl);

                const finalBlob = await merge(bgImg, prodImg);
                results.push({ name: `Vezo_Product_${i+1}.png`, data: finalBlob });

                pFill.style.width = ((i + 1) / files.length * 100) + '%';
                URL.revokeObjectURL(blobUrl); // تنظيف الذاكرة
            }

            st.innerText = "✅ تمت المعالجة! يمكنك التحميل الآن.";
            dlBtn.style.display = 'block'; // إظهار زر التحميل
        } catch (e) {
            st.innerText = "❌ خطأ: " + e.message;
        }
        btn.disabled = false;
    }

    function loadImg(u) {
        return new Promise(r => { const img = new Image(); img.onload = () => r(img); img.src = u; });
    }

    function merge(bg, prod) {
        return new Promise(r => {
            const cvs = document.getElementById('mc');
            const ctx = cvs.getContext('2d');
            cvs.width = bg.width; cvs.height = bg.height;
            ctx.clearRect(0, 0, cvs.width, cvs.height);
            ctx.drawImage(bg, 0, 0);
            
            const s = Math.min(cvs.width/prod.width, cvs.height/prod.height) * 0.8;
            const w = prod.width*s, h = prod.height*s;
            
            ctx.shadowColor = "rgba(0,0,0,0.3)";
            ctx.shadowBlur = 25;
            ctx.drawImage(prod, (cvs.width-w)/2, (cvs.height-h)/2, w, h);
            
            cvs.toBlob(b => r(b), 'image/png
