<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Vezo Studio v3.0 - Stable</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --gold: #c5a059; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 480px; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .option { border: 2px solid #eee; border-radius: 15px; cursor: pointer; padding: 8px; transition: 0.3s; }
        .option.active { border-color: var(--gold); background: #fffcf5; }
        .option img { width: 100%; height: 70px; object-fit: cover; border-radius: 10px; }
        .upload-zone { border: 2px dashed #ddd; padding: 40px 20px; border-radius: 20px; margin: 20px 0; cursor: pointer; background: #fafafa; }
        .btn { background: var(--gold); color: white; border: none; padding: 18px; width: 100%; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        #dlBtn { background: #1a1a1a; margin-top: 15px; display: none !important; }
        #log { margin-top: 15px; font-size: 13px; color: #666; min-height: 20px; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-bottom:5px;">Vezo AI Engine</h2>
    <p style="color:#888; font-size:12px; margin-bottom:25px;">معالجة احترافية مع تحسين القوام والتباين</p>
    
    <div class="grid">
        <div class="option active" onclick="chBg(this, 'https://images.unsplash.com/photo-1582555172866-f73bb12a2ab3?w=1000')">
            <img src="https://images.unsplash.com/photo-1582555172866-f73bb12a2ab3?w=200">
            <div style="font-size:11px; margin-top:5px;">خلفية تراثية</div>
        </div>
        <div class="option" onclick="chBg(this, 'https://images.unsplash.com/photo-1516541196182-6bdb0516ed27?w=1000')">
            <img src="https://images.unsplash.com/photo-1516541196182-6bdb0516ed27?w=200">
            <div style="font-size:11px; margin-top:5px;">استوديو رمادي</div>
        </div>
    </div>

    <div class="upload-zone" onclick="document.getElementById('file').click()">
        <input type="file" id="file" accept="image/*" multiple style="display:none">
        <div style="font-size:18px;">✨</div>
        <div style="font-weight:bold; color:var(--gold);">اضغط هنا لرفع صور المنتجات</div>
    </div>

    <button id="run" class="btn" onclick="go()">🚀 بدء الإنتاج الفائق</button>
    <button id="dlBtn" class="btn" onclick="downloadZip()">📥 تحميل النتائج (ZIP)</button>
    
    <div id="log">جاهز للعمل</div>
</div>

<canvas id="canvas"></canvas>

<script>
    let finalImages = [];
    let bgSrc = 'https://images.unsplash.com/photo-1582555172866-f73bb12a2ab3?w=1000';

    // بياناتك من الصور المرفقة
    const CFG = {
        RM_KEY: '3pocTt3qctAkVgwcwJ4RBE2n',
        CL_NAME: 'dt6t6rdop',
        CL_PRESET: 'cd3h66ff'
    };

    function chBg(el, s) {
        bgSrc = s;
        document.querySelectorAll('.option').forEach(o => o.classList.remove('active'));
        el.classList.add('active');
    }

    async function go() {
        const files = document.getElementById('file').files;
        if (files.length === 0) return alert("لطفاً اختر صوراً أولاً");

        const btn = document.getElementById('run');
        const log = document.getElementById('log');
        btn.disabled = true;
        document.getElementById('dlBtn').style.setProperty('display', 'none', 'important');
        finalImages = [];

        try {
            const bgImg = await loadImg(bgSrc);

            for (let i = 0; i < files.length; i++) {
                log.innerText = `جاري مسح خلفية صورة ${i+1}...`;

                // 1. مسح الخلفية
                const f1 = new FormData();
                f1.append('image_file', files[i]);
                const r1 = await fetch('https://api.remove.bg/v1.0/removebg', {
                    method: 'POST', headers: { 'X-Api-Key': CFG.RM_KEY }, body: f1
                });
                
                if (!r1.ok) throw new Error("فشل مسح الخلفية. تأكد من رصيد Remove.bg");
                const b1 = await r1.blob();

                log.innerText = `جاري الرفع والتحسين لـ Cloudinary...`;

                // 2. الرفع والتحسين
                const f2 = new FormData();
                f2.append('file', b1);
                f2.append('upload_preset', CFG.CL_PRESET);
                // ميزة جديدة: أجبرت Cloudinary على تجاهل المجلدات إذا كانت تسبب خطأ
                const r2 = await fetch(`https://api.cloudinary.com/v1_1/${CFG.CL_NAME}/image/upload`, {
                    method: 'POST', body: f2
                });
                
                const d2 = await r2.json();
                if (!r2.ok) throw new Error(`Cloudinary Error: ${d2.error.message}`);
                
                const hd = `https://res.cloudinary.com/${CFG.CL_NAME}/image/upload/e_upscale,q_auto:best/${d2.public_id}.png`;
                const pImg = await loadImg(hd);

                // 3. الرسم النهائي
                const cvs = document.getElementById('canvas');
                const ctx = cvs.getContext('2d');
                cvs.width = 1500; cvs.height = 1500;
                ctx.drawImage(bgImg, 0, 0, 1500, 1500);
                
                const ratio = Math.min(1100/pImg.width, 1100/pImg.height);
                const w = pImg.width * ratio, h = pImg.height * ratio;
                
                ctx.shadowColor = "rgba(0,0,0,0.25)"; ctx.shadowBlur = 40; ctx.shadowOffsetY = 25;
                ctx.drawImage(pImg, (1500-w)/2, (1500-h)/2, w, h);

                const blob = await new Promise(r => cvs.toBlob(r, 'image/png'));
                finalImages.push({ name: `Vezo_${i+1}.png`, blob: blob });
                log.innerText = `تمت معالجة ${i+1} صور بنجاح`;
            }

            log.innerHTML = "<b style='color:green'>✅ تم الإنتاج بنجاح!</b>";
            document.getElementById('dlBtn').style.setProperty('display', 'block', 'important');
        } catch (e) {
            alert(e.message);
            log.innerText = "توقفت العملية بسبب الخطأ أعلاه.";
        }
        btn.disabled = false;
    }

    function loadImg(s) {
        return new Promise((res, rej) => {
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.onload = () => res(img);
            img.onerror = () => rej();
            img.src = s;
        });
    }

    async function downloadZip() {
        const zip = new JSZip();
        finalImages.forEach(img => zip.file(img.name, img.blob));
        const content = await zip.generateAsync({type:"blob"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(content);
        a.download = "Vezo_Pro_Results.zip";
        a.click();
    }
</script>

</body>
</html>
