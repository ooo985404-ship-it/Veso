<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Vezo Studio AI - النسخة المستقرة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; text-align: center; padding: 20px; }
        .card { background: white; max-width: 420px; margin: auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .opt { border: 2px solid #eee; border-radius: 12px; cursor: pointer; padding: 5px; position: relative; }
        .opt.active { border-color: #c5a059; background: #fffcf0; }
        .opt img { width: 100%; height: 60px; object-fit: cover; border-radius: 8px; }
        .upload-zone { border: 2px dashed #c5a059; padding: 30px; border-radius: 15px; margin: 20px 0; cursor: pointer; background: #fafafa; }
        .btn { background: #c5a059; color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
        #dlBtn { background: #222; margin-top: 12px; display: none !important; } /* الزر مخفي حتى الانتهاء */
        #status { margin-top: 15px; font-size: 13px; color: #666; font-weight: bold; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:#333;">Vezo AI Engine</h2>
    <p style="font-size:12px; color:#888;">رفع الجودة HD ومعالجة تلقائية</p>
    
    <div class="grid">
        <div class="opt active" onclick="setBg(this, 'https://images.unsplash.com/photo-1582555172866-f73bb12a2ab3?w=1000')">
            <img src="https://images.unsplash.com/photo-1582555172866-f73bb12a2ab3?w=200">
            <div style="font-size:10px; margin-top:4px;">خلفية تراثية</div>
        </div>
        <div class="opt" onclick="setBg(this, 'https://images.unsplash.com/photo-1516541196182-6bdb0516ed27?w=1000')">
            <img src="https://images.unsplash.com/photo-1516541196182-6bdb0516ed27?w=200">
            <div style="font-size:10px; margin-top:4px;">استوديو مودرن</div>
        </div>
    </div>

    <div class="upload-zone" onclick="document.getElementById('f').click()">
        <input type="file" id="f" accept="image/*" multiple style="display:none">
        <div style="font-size:24px;">📥</div>
        <strong style="color:#c5a059;">اضغط لرفع صور المنتجات</strong>
    </div>

    <button id="go" class="btn" onclick="start()">🚀 ابدأ المعالجة الآن</button>
    <button id="dlBtn" class="btn" onclick="downloadAll()">📥 تحميل الصور (ملف ZIP)</button>
    
    <div id="status">جاهز للاستخدام</div>
</div>

<canvas id="c"></canvas>

<script>
    let results = [];
    let selectedBg = 'https://images.unsplash.com/photo-1582555172866-f73bb12a2ab3?w=1000';

    // الإعدادات مأخوذة من صورك المرفقة
    const API_CONF = {
        REMOVE_BG: '3pocTt3qctAkVgwcwJ4RBE2n',
        CLOUD_NAME: 'dt6t6rdop',
        PRESET: 'cd3h66ff'
    };

    function setBg(el, url) {
        selectedBg = url;
        document.querySelectorAll('.opt').forEach(o => o.classList.remove('active'));
        el.classList.add('active');
    }

    async function start() {
        const files = document.getElementById('f').files;
        if (files.length === 0) return alert("لطفاً اختر الصور أولاً!");

        const btn = document.getElementById('go');
        const st = document.getElementById('status');
        btn.disabled = true;
        results = [];

        try {
            const bgImg = await loadImg(selectedBg);

            for (let i = 0; i < files.length; i++) {
                st.innerText = `جاري مسح خلفية صورة ${i+1}...`;

                // 1. مسح الخلفية
                const fd1 = new FormData();
                fd1.append('image_file', files[i]);
                const res1 = await fetch('https://api.remove.bg/v1.0/removebg', {
                    method: 'POST', headers: { 'X-Api-Key': API_CONF.REMOVE_BG }, body: fd1
                });
                
                if (!res1.ok) throw new Error("تأكد من رصيد مفتاح Remove.bg");
                const blob1 = await res1.blob();

                st.innerText = `تحسين الجودة والرفع لـ Cloudinary...`;

                // 2. الرفع والتحسين (باستخدام الرابط المباشر للمتصفح)
                const fd2 = new FormData();
                fd2.append('file', blob1);
                fd2.append('upload_preset', API_CONF.PRESET);
                
                const res2 = await fetch(`https://api.cloudinary.com/v1_1/${API_CONF.CLOUD_NAME}/image/upload`, {
                    method: 'POST', body: fd2
                });
                
                const data2 = await res2.json();
                if (!res2.ok) throw new Error(`خطأ Cloudinary: ${data2.error.message}`);
                
                // تطبيق فلاتر تحسين الذكاء الاصطناعي (AI Upscale)
                const hdUrl = `https://res.cloudinary.com/${API_CONF.CLOUD_NAME}/image/upload/e_upscale,q_auto:best/${data2.public_id}.png`;
                const prodImg = await loadImg(hdUrl);

                // 3. دمج الصور بمقاس 1500px
                const cvs = document.getElementById('c');
                const ctx = cvs.getContext('2d');
                cvs.width = 1500; cvs.height = 1500;
                ctx.drawImage(bgImg, 0, 0, 1500, 1500);
                
                const scale = Math.min(1100/prodImg.width, 1100/prodImg.height);
                const w = prodImg.width * scale, h = prodImg.height * scale;
                
                ctx.shadowColor = "rgba(0,0,0,0.3)"; ctx.shadowBlur = 40; ctx.shadowOffsetY = 25;
                ctx.drawImage(prodImg, (1500-w)/2, (1500-h)/2, w, h);

                const finalBlob = await new Promise(r => cvs.toBlob(r, 'image/png'));
                results.push({ name: `Vezo_Pro_${i+1}.png`, blob: finalBlob });
                st.innerText = `تمت معالجة ${i+1} من ${files.length}`;
            }

            st.innerHTML = "<b style='color:green'>✅ اكتملت المعالجة!</b>";
            document.getElementById('dlBtn').style.setProperty('display', 'block', 'important');
        } catch (e) {
            alert(e.message);
            st.innerText = "فشلت العملية.";
        }
        btn.disabled = false;
    }

    function loadImg(src) {
        return new Promise((res, rej) => {
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.onload = () => res(img);
            img.onerror = () => rej();
            img.src = src;
        });
    }

    async function downloadAll() {
        const zip = new JSZip();
        results.forEach(r => zip.file(r.name, r.blob));
        const blob = await zip.generateAsync({type:"blob"});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = "Vezo_Studio_Results.zip";
        link.click();
    }
</script>

</body>
</html>
