<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Vezo Studio - Fixed Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding: 10px; }
        .box { background: white; max-width: 450px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .bg-options { display: flex; gap: 10px; justify-content: center; margin: 15px 0; }
        .opt { border: 2px solid #ddd; cursor: pointer; padding: 5px; border-radius: 8px; width: 80px; }
        .opt.active { border-color: #c5a059; background: #fff9eb; }
        .opt img { width: 100%; height: 50px; object-fit: cover; border-radius: 4px; }
        .upload-area { border: 2px dashed #c5a059; padding: 30px; margin: 20px 0; border-radius: 10px; cursor: pointer; }
        .btn { background: #c5a059; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #downloadBtn { background: #222; margin-top: 15px; display: none !important; }
        #status { margin-top: 15px; color: #666; font-size: 13px; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="box">
    <h3>استوديو فيزو - معالجة ذكية</h3>
    
    <div class="bg-options">
        <div class="opt active" onclick="setBg(this, 'https://images.unsplash.com/photo-1582555172866-f73bb12a2ab3?w=800')">
            <img src="https://images.unsplash.com/photo-1582555172866-f73bb12a2ab3?w=200">
            <span style="font-size:10px;">تراثي</span>
        </div>
        <div class="opt" onclick="setBg(this, 'https://images.unsplash.com/photo-1516541196182-6bdb0516ed27?w=800')">
            <img src="https://images.unsplash.com/photo-1516541196182-6bdb0516ed27?w=200">
            <span style="font-size:10px;">استوديو</span>
        </div>
    </div>

    <div class="upload-area" onclick="document.getElementById('fileInp').click()">
        <input type="file" id="fileInp" accept="image/*" multiple style="display:none">
        <strong>📸 اختر الصور لبدء الإنتاج</strong>
    </div>

    <button id="startBtn" class="btn" onclick="processAll()">🚀 ابدأ المعالجة</button>
    <button id="downloadBtn" class="btn" onclick="saveZip()">📥 تحميل ملف ZIP</button>
    
    <div id="status">جاهز</div>
</div>

<canvas id="mainCanvas"></canvas>

<script>
    let results = [];
    let currentBg = 'https://images.unsplash.com/photo-1582555172866-f73bb12a2ab3?w=800';

    // الإعدادات من صورك
    const REMOVE_BG_KEY = '3pocTt3qctAkVgwcwJ4RBE2n'; 
    const CLOUD_NAME = 'dt6t6rdop';
    const CLOUD_PRESET = 'cd3h66ff'; 

    function setBg(el, url) {
        currentBg = url;
        document.querySelectorAll('.opt').forEach(o => o.classList.remove('active'));
        el.classList.add('active');
    }

    async function processAll() {
        const files = document.getElementById('fileInp').files;
        if (files.length === 0) return alert("لطفاً اختر الصور");

        const btn = document.getElementById('startBtn');
        const status = document.getElementById('status');
        btn.disabled = true;
        results = [];

        try {
            const bgImg = await loadImg(currentBg);

            for (let i = 0; i < files.length; i++) {
                status.innerText = `جاري مسح خلفية: ${files[i].name}...`;

                // 1. مسح الخلفية (Remove.bg)
                const fd1 = new FormData();
                fd1.append('image_file', files[i]);
                const res1 = await fetch('https://api.remove.bg/v1.0/removebg', {
                    method: 'POST', headers: { 'X-Api-Key': REMOVE_BG_KEY }, body: fd1
                });
                
                if (!res1.ok) throw new Error("مشكلة في مفتاح Remove.bg (نفاد الرصيد)");
                const blob1 = await res1.blob();

                status.innerText = `جاري تحسين الجودة والرفع...`;

                // 2. الرفع لـ Cloudinary
                const fd2 = new FormData();
                fd2.append('file', blob1);
                fd2.append('upload_preset', CLOUD_PRESET);
                const res2 = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                    method: 'POST', body: fd2
                });
                
                if (!res2.ok) throw new Error("مشكلة في إعدادات Cloudinary");
                const data2 = await res2.json();
                
                const hdUrl = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/e_upscale,q_auto:best/${data2.public_id}.png`;
                const prodImg = await loadImg(hdUrl);

                // 3. الدمج
                const cvs = document.getElementById('mainCanvas');
                const ctx = cvs.getContext('2d');
                cvs.width = 1500; cvs.height = 1500;
                ctx.drawImage(bgImg, 0, 0, 1500, 1500);
                
                const ratio = Math.min(1100/prodImg.width, 1100/prodImg.height);
                const w = prodImg.width * ratio, h = prodImg.height * ratio;
                
                ctx.shadowColor = "rgba(0,0,0,0.3)"; ctx.shadowBlur = 30; ctx.shadowOffsetY = 20;
                ctx.drawImage(prodImg, (1500-w)/2, (1500-h)/2, w, h);

                const finalBlob = await new Promise(r => cvs.toBlob(r, 'image/png'));
                results.push({ name: `Vezo_${i+1}.png`, blob: finalBlob });
                
                status.innerText = `اكتملت ${i+1} من ${files.length}`;
            }

            status.innerHTML = "<b style='color:green'>✅ تم بنجاح!</b>";
            document.getElementById('downloadBtn').style.setProperty('display', 'block', 'important');
        } catch (e) {
            alert(e.message);
            status.innerText = "توقف العمل بسبب خطأ.";
        }
        btn.disabled = false;
    }

    function loadImg(src) {
        return new Promise((res, rej) => {
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.onload = () => res(img);
            img.onerror = () => rej();
            img.src = src;
        });
    }

    async function saveZip() {
        const zip = new JSZip();
        results.forEach(item => zip.file(item.name, item.blob));
        const content = await zip.generateAsync({type:"blob"});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = "My_Products.zip";
        link.click();
    }
</script>

</body>
</html>
