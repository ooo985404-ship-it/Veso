<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vezo Ultra AI Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --primary: #c5a059; --dark: #1f2937; --success: #10b981; }
        body { font-family: 'Segoe UI', sans-serif; background: #f3f4f6; padding: 20px; display: flex; justify-content: center; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; position: relative; }
        .hd-badge { background: var(--success); color: white; font-size: 10px; padding: 4px 10px; border-radius: 20px; position: absolute; top: 15px; right: 15px; font-weight: bold; }
        .templates-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 20px 0; }
        .template-item { border: 2px solid #eee; border-radius: 12px; cursor: pointer; transition: 0.3s; padding: 5px; }
        .template-item img { width: 100%; height: 60px; object-fit: cover; border-radius: 8px; }
        .template-item.active { border-color: var(--primary); background: #fffbeb; }
        .upload-area { border: 2px dashed #ddd; padding: 30px; border-radius: 15px; margin: 20px 0; cursor: pointer; }
        .progress-box { display: none; margin: 20px 0; text-align: right; }
        .bar-bg { width: 100%; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .bar-fill { width: 0%; height: 100%; background: var(--primary); transition: 0.3s; }
        .main-btn { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .main-btn:disabled { background: #ccc; }
        .zip-btn { background: var(--dark); margin-top: 10px; display: none; }
        canvas { display: none; }
        #status { font-size: 12px; color: #777; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="hd-badge">AI UPSCALING ACTIVE</div>
    <h2 style="margin:0; color:var(--dark);">Vezo Ultra AI</h2>
    <p style="font-size:13px; color:#666;">معالجة فائقة الوضوح عبر Cloudinary</p>

    <div class="templates-grid">
        <div class="template-item active" onclick="selectTpl('sadu.png', this)"><img src="sadu.png"><span>تراثي</span></div>
        <div class="template-item" onclick="selectTpl('lgrey.png', this)"><img src="lgrey.png"><span>استوديو</span></div>
    </div>

    <div class="upload-area" onclick="document.getElementById('imageInput').click()">
        <input type="file" id="imageInput" accept="image/*" multiple style="display:none">
        <div id="uploadText"><b>اضغط لرفع صور المنتجات</b></div>
    </div>

    <div class="progress-box" id="pBox">
        <span id="pText" style="font-size:12px;">جاري المعالجة...</span>
        <div class="bar-bg"><div class="bar-fill" id="pFill"></div></div>
    </div>

    <button id="processBtn" class="main-btn" onclick="startProduction()">🚀 معالجة فورية (Ultra HD)</button>
    <button id="zipBtn" class="main-btn zip-btn" onclick="downloadZip()">📥 تحميل النتائج (ZIP)</button>
    
    <div id="status">جاهز للعمل</div>
</div>

<canvas id="mainCanvas"></canvas>

<script>
    let processedFiles = [];
    let selectedTpl = 'sadu.png';

    // الإعدادات التي استخرجناها سوياً
    const REMOVE_BG_KEY = '3pocTt3qctAkVgwcwJ4RBE2n'; 
    const CLOUDINARY_NAME = 'dt6t6rdop';
    const CLOUDINARY_PRESET = 'cd3h66ff'; 

    function selectTpl(url, el) {
        selectedTpl = url;
        document.querySelectorAll('.template-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }

    async function startProduction() {
        const files = document.getElementById('imageInput').files;
        if (files.length === 0) return alert("اختر صوراً أولاً");

        const btn = document.getElementById('processBtn');
        const pBox = document.getElementById('pBox');
        btn.disabled = true;
        pBox.style.display = 'block';
        processedFiles = [];

        try {
            const bgImg = await loadImg(selectedTpl);

            for (let i = 0; i < files.length; i++) {
                updateProgress(i, files.length, `معالجة ${files[i].name}...`);

                // 1. إزالة الخلفية
                const noBgBlob = await callRemoveBg(files[i]);

                // 2. الرفع لـ Cloudinary وتحسين الوضوح (AI Upscaling)
                const hdUrl = await upgradeImage(noBgBlob);
                const productImg = await loadImg(hdUrl);

                // 3. الدمج النهائي بجودة 2000px
                const finalBlob = await mergeImages(bgImg, productImg);
                
                processedFiles.push({ name: `Vezo_HD_${i+1}.png`, blob: finalBlob });
            }

            document.getElementById('status').innerText = "✅ تمت المعالجة بنجاح!";
            document.getElementById('zipBtn').style.display = 'block';
        } catch (e) {
            console.error(e);
            alert("حدث خطأ في المعالجة. تأكد من تفعيل Unsigned في Cloudinary.");
        }
        btn.disabled = false;
    }

    async function callRemoveBg(file) {
        const formData = new FormData();
        formData.append('image_file', file);
        const res = await fetch('https://api.remove.bg/v1.0/removebg', {
            method: 'POST', headers: { 'X-Api-Key': REMOVE_BG_KEY }, body: formData
        });
        if(!res.ok) throw new Error("Remove.bg failed");
        return await res.blob();
    }

    async function upgradeImage(blob) {
        const formData = new FormData();
        formData.append('file', blob);
        formData.append('upload_preset', CLOUDINARY_PRESET);

        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_NAME}/image/upload`, {
            method: 'POST', body: formData
        });
        const data = await res.json();
        
        // رابط التحسين الذكي: e_upscale لتكبير الصورة و q_auto لأفضل جودة
        return `https://res.cloudinary.com/${CLOUDINARY_NAME}/image/upload/e_upscale/f_auto,q_auto/${data.public_id}.png`;
    }

    async function mergeImages(bg, prod) {
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 2000; canvas.height = 2000;

        ctx.drawImage(bg, 0, 0, 2000, 2000);
        
        const scale = Math.min(2000 / prod.width, 2000 / prod.height) * 0.75;
        const w = prod.width * scale;
        const h = prod.height * scale;
        const x = (2000 - w) / 2;
        const y = (2000 - h) / 2;

        // إضافة ظل المنتج
        ctx.shadowColor = "rgba(0,0,0,0.3)";
        ctx.shadowBlur = 35;
        ctx.shadowOffsetY = 20;
        
        ctx.drawImage(prod, x, y, w, h);

        return new Promise(r => canvas.toBlob(r, 'image/png', 1.0));
    }

    function loadImg(url) {
        return new Promise(r => { const i = new Image(); i.crossOrigin="anonymous"; i.onload=()=>r(i); i.src=url; });
    }

    function updateProgress(i, total, text) {
        let p = ((i+1)/total)*100;
        document.getElementById('pFill').style.width = p+'%';
        document.getElementById('pText').innerText = text;
    }

    async function downloadZip() {
        const zip = new JSZip();
        processedFiles.forEach(f => zip.file(f.name, f.blob));
        const content = await zip.generateAsync({type:"blob"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(content);
        a.download = `Vezo_AI_Studio.zip`;
        a.click();
    }
</script>

</body>
</html>
