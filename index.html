<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vezo HD Studio | استوديو فيزو الذكي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { 
            --primary: #c5a059; 
            --dark: #1f2937; 
            --success: #10b981;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f3f4f6; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            margin: 0; 
        }
        .card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 600px; 
            text-align: center; 
            position: relative;
            border: 1px solid #eee;
        }
        
        .hd-badge { 
            background: var(--success); 
            color: white; 
            font-size: 11px; 
            padding: 4px 12px; 
            border-radius: 20px; 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            font-weight: bold;
        }

        .templates-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); 
            gap: 15px; 
            margin: 25px 0; 
        }
        .template-item { 
            border: 3px solid #f0f0f0; 
            border-radius: 18px; 
            overflow: hidden; 
            cursor: pointer; 
            transition: 0.3s all ease; 
            background: #fff;
        }
        .template-item img { width: 100%; height: 85px; object-fit: cover; display: block; }
        .template-item span { font-size: 12px; padding: 8px; display: block; font-weight: 600; color: #444; }
        .template-item.active { 
            border-color: var(--primary); 
            transform: translateY(-5px); 
            box-shadow: 0 10px 20px rgba(197, 160, 89, 0.3); 
        }

        .upload-area { 
            border: 2px dashed #d1d5db; 
            padding: 40px 20px; 
            border-radius: 20px; 
            margin-bottom: 25px; 
            cursor: pointer; 
            background: #f9fafb; 
            transition: 0.3s;
        }
        .upload-area:hover { border-color: var(--primary); background: #fffbeb; }
        
        .progress-box { display: none; margin: 25px 0; background: #fff; padding: 15px; border-radius: 15px; border: 1px solid #eee; }
        .bar-bg { width: 100%; height: 10px; background: #e5e7eb; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--primary), #e2bc7a); transition: 0.4s; }
        
        .main-btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 18px; 
            width: 100%; 
            border-radius: 15px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(197, 160, 89, 0.3);
        }
        .main-btn:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }
        .zip-btn { background: var(--dark); margin-top: 15px; display: none; }

        canvas { display: none; }
        #status { font-size: 14px; color: #6b7280; margin-top: 15px; font-weight: 500; }
    </style>
</head>
<body>

<div class="card">
    <div class="hd-badge">DPI 300 | Ultra HD</div>
    <h2 style="margin-bottom:5px; color: var(--dark);">Vezo AI Studio 2.0</h2>
    <p style="font-size:14px; color:#666; margin-bottom:30px;">إنتاج صور احترافية للمتاجر بالذكاء الاصطناعي</p>

    <h4 style="text-align:right; margin-bottom:10px; color: var(--dark);">1. اختر طابع الخلفية:</h4>
    <div class="templates-grid" id="tplGrid">
        <div class="template-item active" onclick="selectTpl('sadu.png', this)"><img src="sadu.png"><span>سدو تراثي</span></div>
        <div class="template-item" onclick="selectTpl('ksanat.png', this)"><img src="ksanat.png"><span>هوية وطنية</span></div>
        <div class="template-item" onclick="selectTpl('founding.png', this)"><img src="founding.png"><span>يوم التأسيس</span></div>
        <div class="template-item" onclick="selectTpl('lgrey.png', this)"><img src="lgrey.png"><span>رمادي استوديو</span></div>
    </div>

    <div class="upload-area" id="dropZone" onclick="document.getElementById('imageInput').click()">
        <input type="file" id="imageInput" accept="image/*" multiple style="display:none">
        <div id="uploadText" style="font-weight:bold; color: #4b5563;">📁 اضغط هنا لرفع صور المنتجات</div>
        <p style="font-size:12px; color:#9ca3af; margin-top:8px;">يدعم المعالجة الجماعية (Batch Processing)</p>
    </div>

    <div class="progress-box" id="pBox">
        <div style="display:flex; justify-content:space-between; font-size:13px;">
            <span id="pText" style="font-weight:bold;">جاري معالجة الصور...</span>
            <span id="pPerc" style="color:var(--primary);">0%</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" id="pFill"></div></div>
    </div>

    <button id="processBtn" class="main-btn" onclick="startProduction()">🚀 بدء الإنتاج الفوري (HD)</button>
    <button id="zipBtn" class="main-btn zip-btn" onclick="downloadZip()">📥 تحميل جميع الصور (ZIP)</button>
    
    <div id="status">جاهز لمعالجة صورك بأعلى دقة</div>
</div>

<canvas id="mainCanvas"></canvas>

<script>
    let processedFiles = [];
    let selectedTpl = 'sadu.png';
    // مفتاح الـ API الخاص بك
    const API_KEY = '3pocTt3qctAkVgwcwJ4RBE2n'; 

    function selectTpl(url, el) {
        selectedTpl = url;
        document.querySelectorAll('.template-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }

    async function startProduction() {
        const files = document.getElementById('imageInput').files;
        if (files.length === 0) return alert("يرجى اختيار صور أولاً");

        const btn = document.getElementById('processBtn');
        const pBox = document.getElementById('pBox');
        
        btn.disabled = true;
        pBox.style.display = 'block';
        processedFiles = [];

        try {
            const bgImg = await loadImg(selectedTpl);

            for (let i = 0; i < files.length; i++) {
                document.getElementById('status').innerText = `جاري معالجة الصورة ${i+1} من ${files.length}...`;
                
                try {
                    // 1. قص الخلفية
                    const noBgBlob = await callRemoveBg(files[i]);
                    const productImg = await loadImg(URL.createObjectURL(noBgBlob));
                    
                    // 2. الدمج وتحسين الوضوح (HD Engine)
                    const finalBlob = await mergeImagesHD(bgImg, productImg);
                    
                    processedFiles.push({ 
                        name: `Vezo_Product_${i+1}_${Date.now()}.png`, 
                        blob: finalBlob 
                    });
                } catch (e) {
                    console.error("خطأ في معالجة صورة:", e);
                }

                // تحديث العداد
                let progress = ((i + 1) / files.length) * 100;
                document.getElementById('pFill').style.width = progress + '%';
                document.getElementById('pPerc').innerText = Math.round(progress) + '%';
            }

            document.getElementById('status').innerText = "✨ تمت المعالجة بنجاح باهر!";
            document.getElementById('zipBtn').style.display = 'block';
        } catch (e) {
            alert("حدث خطأ تقني، تأكد من مفتاح API أو اتصال الإنترنت");
        }
        btn.disabled = false;
    }

    async function callRemoveBg(file) {
        const formData = new FormData();
        formData.append('image_file', file);
        formData.append('size', 'auto');
        
        const response = await fetch('https://api.remove.bg/v1.0/removebg', {
            method: 'POST',
            headers: { 'X-Api-Key': API_KEY },
            body: formData
        });
        
        if (!response.ok) throw new Error("API Error");
        return await response.blob();
    }

    function loadImg(url) {
        return new Promise((resolve) => {
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.onload = () => resolve(img);
            img.src = url;
        });
    }

    async function mergeImagesHD(bg, prod) {
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        
        // ضبط أبعاد استوديو (HD)
        canvas.width = 2000;
        canvas.height = 2000;

        // إعدادات تنعيم البكسلات العالية
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';

        // رسم الخلفية
        ctx.drawImage(bg, 0, 0, 2000, 2000);

        // حساب مقاس المنتج (توسيط بنسبة 75%)
        const scale = Math.min(canvas.width / prod.width, canvas.height / prod.height) * 0.75;
        const w = prod.width * scale;
        const h = prod.height * scale;
        const x = (canvas.width - w) / 2;
        const y = (canvas.height - h) / 2;

        // --- محرك تحسين الوضوح (Sharpening & Depth) ---
        ctx.save();
        // إضافة فلتر لتحسين التباين والحدة لمحاكاة الـ Upscale
        ctx.filter = 'contrast(1.1) saturate(1.05) brightness(1.02)';
        
        // إضافة ظل احترافي عميق
        ctx.shadowColor = "rgba(0,0,0,0.4)";
        ctx.shadowBlur = 40;
        ctx.shadowOffsetY = 25;
        
        ctx.drawImage(prod, x, y, w, h);
        ctx.restore();

        // إضافة لمسة ضوء ناعمة في المركز (Studio Light)
        ctx.globalCompositeOperation = 'soft-light';
        const grad = ctx.createRadialGradient(1000, 1000, 100, 1000, 1000, 900);
        grad.addColorStop(0, 'rgba(255,255,255,0.15
